<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PIXEL MEHEDI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;background:#07090f;
  font-family:'Press Start 2P',monospace;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
}

/* ═══════════════════════════════════════
   ROTATE PROMPT
═══════════════════════════════════════ */
#rotate-msg{
  display:none;position:fixed;inset:0;z-index:9999;
  background:#07090f;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
}
#rotate-msg span{font-size:52px;animation:spin 2s ease-in-out infinite}
@keyframes spin{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
#rotate-msg p{font-size:10px;color:#ffe066;text-align:center;line-height:2.2;padding:0 20px}
@media(max-width:768px) and (orientation:portrait){
  #rotate-msg{display:flex}
  #app{display:none!important}
}

/* ═══════════════════════════════════════
   APP ROOT
═══════════════════════════════════════ */
#app{position:fixed;inset:0;overflow:hidden}

/* ═══════════════════════════════════════
   SHARED SCREEN BASE
═══════════════════════════════════════ */
.screen{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:#07090f;
}
.screen.active{display:flex}

/* star background shared */
.screen::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(1px 1px at 8%  12%,rgba(255,255,255,.85) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 6%, rgba(255,255,255,.65) 0%,transparent 100%),
    radial-gradient(2px 2px at 38% 18%,rgba(255,210,80,.75)  0%,transparent 100%),
    radial-gradient(1px 1px at 55% 8%, rgba(255,255,255,.55) 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 22%,rgba(180,160,255,.75) 0%,transparent 100%),
    radial-gradient(2px 2px at 87% 5%, rgba(255,255,255,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 15% 58%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 68% 44%,rgba(255,255,255,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 3%  76%,rgba(130,100,255,.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 91% 62%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(2px 2px at 48% 85%,rgba(255,200,60,.35)  0%,transparent 100%),
    radial-gradient(1px 1px at 78% 78%,rgba(255,255,255,.30) 0%,transparent 100%);
  animation:starTwinkle 4s ease-in-out infinite alternate;
}
@keyframes starTwinkle{0%{opacity:.5}100%{opacity:1}}

/* top accent line */
.screen::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;pointer-events:none;
  background:linear-gradient(90deg,transparent,#7b4fff,#ffe066,#7b4fff,transparent);
}

/* ═══════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════ */
#home-screen{background:linear-gradient(170deg,#07090f 0%,#0c0f22 50%,#07090f 100%)}

.home-title-wrap{text-align:center;margin-bottom:40px}
.home-eyebrow{
  font-size:clamp(7px,1.8vw,10px);color:#7b4fff;
  letter-spacing:5px;display:block;margin-bottom:10px;opacity:.8;
}
.home-title{
  font-size:clamp(26px,8vw,60px);
  color:#ffe066;
  display:block;
  line-height:1.25;
  letter-spacing:3px;
  text-shadow:
    0 0 20px rgba(255,200,40,.9),
    0 0 44px rgba(255,150,0,.55),
    0 0 80px rgba(255,80,0,.25),
    3px 4px 0 rgba(0,0,0,.9);
  animation:homeGlow 3s ease-in-out infinite;
}
@keyframes homeGlow{
  0%,100%{text-shadow:0 0 20px rgba(255,200,40,.9),0 0 44px rgba(255,150,0,.55),3px 4px 0 rgba(0,0,0,.9)}
  50%{text-shadow:0 0 32px rgba(255,220,60,1),0 0 66px rgba(255,180,0,.8),0 0 110px rgba(255,100,0,.4),3px 4px 0 rgba(0,0,0,.9)}
}
.home-sub{
  font-size:clamp(6px,1.6vw,8px);color:#44ffcc;
  letter-spacing:3px;display:block;margin-top:8px;opacity:.75;
}

/* ── MENU LIST ── */
.menu-list{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;width:100%;max-width:300px;
}
.menu-btn{
  width:100%;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(9px,2.5vw,12px);
  color:#e0e0ff;
  background:rgba(123,79,255,.08);
  border:1px solid rgba(123,79,255,.3);
  padding:14px 20px;
  cursor:pointer;text-align:center;
  letter-spacing:2px;
  transition:background .15s,border-color .15s,color .15s,transform .08s;
  position:relative;overflow:hidden;
}
.menu-btn::before{
  content:'▶';position:absolute;left:14px;
  font-size:clamp(8px,2vw,10px);color:#7b4fff;
  opacity:0;transition:opacity .15s;
}
.menu-btn:hover,.menu-btn:active{
  background:rgba(123,79,255,.22);
  border-color:rgba(123,79,255,.7);
  color:#fff;transform:translateX(4px);
}
.menu-btn:hover::before,.menu-btn:active::before{opacity:1}
.menu-btn.danger{color:#ff8888;border-color:rgba(255,80,80,.3)}
.menu-btn.danger:hover,.menu-btn.danger:active{background:rgba(255,60,60,.15);border-color:rgba(255,80,80,.7);color:#fff}

/* ═══════════════════════════════════════
   OPTIONS SCREEN (sub-menus)
═══════════════════════════════════════ */
#options-screen,.sub-screen{background:linear-gradient(170deg,#07090f 0%,#0c0f22 50%,#07090f 100%)}

.screen-header{
  display:flex;align-items:center;gap:14px;margin-bottom:36px;
}
.back-btn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,2vw,10px);
  color:#a88bff;background:rgba(123,79,255,.1);
  border:1px solid rgba(123,79,255,.3);
  padding:8px 14px;cursor:pointer;
  transition:background .1s,border-color .1s;
}
.back-btn:hover,.back-btn:active{background:rgba(123,79,255,.25);border-color:#7b4fff;color:#fff}
.screen-title{
  font-size:clamp(10px,3vw,16px);
  color:#ffe066;
  text-shadow:0 0 16px rgba(255,200,40,.6);
  letter-spacing:3px;
}

/* ── OPTION ROWS ── */
.opt-list{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px}
.opt-btn{
  width:100%;font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,2.2vw,11px);
  color:#c0c0ff;background:rgba(123,79,255,.07);
  border:1px solid rgba(123,79,255,.25);
  padding:13px 18px;cursor:pointer;text-align:left;
  letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;
  transition:background .12s,border-color .12s;
}
.opt-btn .opt-val{color:#44ffcc;font-size:clamp(7px,1.8vw,9px)}
.opt-btn:hover,.opt-btn:active{background:rgba(123,79,255,.2);border-color:rgba(123,79,255,.6);color:#fff}

/* ── NAME EDIT ── */
.name-edit-wrap{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px}
.opt-label{font-size:clamp(7px,1.8vw,9px);color:#a88bff;letter-spacing:2px}
#char-name-input{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(10px,2.8vw,14px);
  color:#ffe066;background:rgba(123,79,255,.08);
  border:2px solid rgba(123,79,255,.35);
  padding:12px 14px;outline:none;letter-spacing:2px;width:100%;
  -webkit-appearance:none;border-radius:0;
  transition:border-color .2s,box-shadow .2s;
}
#char-name-input:focus{border-color:#7b4fff;box-shadow:0 0 12px rgba(123,79,255,.4)}
#char-name-input::placeholder{color:rgba(123,79,255,.4);font-size:clamp(7px,2vw,9px)}
.save-btn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,2.2vw,11px);
  color:#07090f;background:linear-gradient(135deg,#ffe066,#ffaa22);
  border:none;padding:12px 24px;cursor:pointer;letter-spacing:2px;
  box-shadow:0 0 18px rgba(255,200,40,.5),0 3px 0 rgba(150,100,0,.8);
  transition:transform .08s,box-shadow .08s;
}
.save-btn:active{transform:translateY(2px);box-shadow:0 0 10px rgba(255,200,40,.3),0 1px 0 rgba(150,100,0,.8)}

/* ── LEVEL CHOICE ── */
.level-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;max-width:340px}
.lv-btn{
  font-family:'Press Start 2P',monospace;font-size:clamp(7px,2vw,9px);
  border:2px solid;background:rgba(7,9,15,.7);
  padding:14px 8px;cursor:pointer;text-align:center;line-height:2;
  transition:all .12s;
}
.lv-btn[data-l=easy]  {color:#44ff88;border-color:rgba(68,255,136,.3)}
.lv-btn[data-l=medium]{color:#ffe066;border-color:rgba(255,224,102,.3)}
.lv-btn[data-l=hard]  {color:#ff5544;border-color:rgba(255,85,68,.3)}
.lv-btn.chosen{
  background:rgba(255,255,255,.07);
  border-color:currentColor;
  box-shadow:0 0 14px currentColor;
  text-shadow:0 0 8px currentColor;
}

/* ── GAMEPAD SETTINGS ── */
.gp-opt-grid{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px}
.gp-opt-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:clamp(7px,1.8vw,9px);color:#c0c0ff;
  border-bottom:1px solid rgba(123,79,255,.15);padding-bottom:10px;
}
.gp-opt-row:last-child{border-bottom:none}
.gp-opt-label{letter-spacing:1px}
.slider-wrap{display:flex;align-items:center;gap:8px}
input[type=range]{
  -webkit-appearance:none;width:120px;height:4px;
  background:rgba(123,79,255,.35);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:#7b4fff;cursor:pointer;box-shadow:0 0 8px rgba(123,79,255,.7);
}
input[type=range]::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;border:none;
  background:#7b4fff;cursor:pointer;
}
.slider-val{color:#44ffcc;font-size:clamp(7px,1.8vw,9px);min-width:30px;text-align:right}
.toggle-btn{
  font-family:'Press Start 2P',monospace;font-size:7px;
  padding:6px 10px;border:1px solid;cursor:pointer;background:transparent;
  transition:all .1s;
}
.toggle-btn[data-on=true]{color:#44ff88;border-color:#44ff88;background:rgba(68,255,136,.1)}
.toggle-btn[data-on=false]{color:#ff5544;border-color:#ff5544;background:rgba(255,85,68,.08)}

/* ═══════════════════════════════════════
   GAME SCREEN
═══════════════════════════════════════ */
#game-screen{display:none;background:#000}
#game-screen.active{display:flex;align-items:center;justify-content:center}

#canvas-box{position:relative;overflow:hidden}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}

/* HUD overlay */
#hud{
  position:absolute;top:0;left:0;right:0;height:24px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 10px;
  background:linear-gradient(180deg,rgba(0,0,0,.72),transparent);
  pointer-events:none;z-index:5;font-size:8px;
}
.hg{display:flex;align-items:center;gap:4px}
.hl{color:#a88bff}.hv{color:#fff;text-shadow:0 0 6px #7b4fff}
#hn{color:#ffe066;font-size:7px;max-width:100px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* Pause overlay */
#pause-ov{
  display:none;position:absolute;inset:0;z-index:50;
  background:rgba(0,0,0,.84);
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#pause-ov.show{display:flex}
.pov-title{font-size:clamp(12px,3.5vw,20px);color:#ffe066;letter-spacing:4px;text-shadow:0 0 18px rgba(255,200,40,.7);margin-bottom:6px}
.pov-btn{
  font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.2vw,11px);
  background:rgba(123,79,255,.12);border:1px solid rgba(123,79,255,.45);
  color:#a88bff;padding:11px 30px;cursor:pointer;letter-spacing:2px;
  width:200px;text-align:center;transition:all .1s;
}
.pov-btn:active{background:rgba(123,79,255,.35);color:#fff}
#pov-quit{color:#ff8888;border-color:rgba(255,80,80,.4)}
#pov-quit:active{background:rgba(255,60,60,.2)}

/* ═══════════════════════════════════════
   DRAGGABLE GAMEPAD
═══════════════════════════════════════ */
#gamepad{
  position:absolute;inset:0;pointer-events:none;z-index:20;
  display:none; /* shown only on touch */
}

/* individual draggable button clusters */
.gp-cluster{
  position:absolute;pointer-events:auto;
  cursor:grab;
  /* default positions set by JS */
}
.gp-cluster:active{cursor:grabbing}

/* resize handle */
.gp-resize{
  position:absolute;bottom:-4px;right:-4px;
  width:14px;height:14px;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.35);
  cursor:nwse-resize;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:rgba(255,255,255,.5);
  pointer-events:auto;
}

/* glassy circle button */
.gpb{
  position:absolute;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
  background:radial-gradient(circle at 36% 30%,rgba(255,255,255,.2) 0%,rgba(255,255,255,.04) 55%,transparent 100%);
  border:1.5px solid rgba(255,255,255,.24);
  box-shadow:0 2px 14px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.28);
  color:rgba(255,255,255,.75);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  transition:background .05s,box-shadow .05s,transform .05s;
  touch-action:none;
}
.gpb.gp-press{
  background:radial-gradient(circle at 36% 30%,rgba(123,79,255,.6) 0%,rgba(123,79,255,.18) 55%,transparent 100%);
  box-shadow:0 0 22px rgba(123,79,255,.75),inset 0 1px 0 rgba(255,255,255,.3);
  transform:scale(.91);color:#fff;border-color:rgba(123,79,255,.85);
}
.gpb-icon{font-size:clamp(16px,4vw,22px);line-height:1;pointer-events:none}
.gpb-lbl{font-size:5px;opacity:.65;margin-top:1px;pointer-events:none}

/* fire button tint */
#gp-fire.gpb{
  background:radial-gradient(circle at 36% 30%,rgba(68,255,204,.25) 0%,rgba(68,255,204,.06) 55%,transparent 100%);
  border-color:rgba(68,255,204,.45);
  box-shadow:0 0 16px rgba(68,255,204,.28),0 2px 12px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.22);
  color:rgba(68,255,204,.9);
}
#gp-fire.gp-press{
  background:radial-gradient(circle at 36% 30%,rgba(68,255,204,.6) 0%,rgba(68,255,204,.2) 55%,transparent 100%);
  box-shadow:0 0 30px rgba(68,255,204,.75),inset 0 1px 0 rgba(255,255,255,.3);
  border-color:rgba(68,255,204,.9);
}
#gp-esc.gpb{
  background:radial-gradient(circle at 36% 30%,rgba(255,80,80,.2) 0%,rgba(255,80,80,.05) 55%,transparent 100%);
  border-color:rgba(255,80,80,.38);
  box-shadow:0 0 12px rgba(255,80,80,.2),0 2px 10px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.18);
  color:rgba(255,120,120,.88);font-size:7px;
}
#gp-esc.gp-press{background:rgba(255,60,60,.38);border-color:rgba(255,80,80,.85)}

/* drag-mode indicator */
#drag-mode-btn{
  position:absolute;top:6px;right:6px;z-index:25;
  font-family:'Press Start 2P',monospace;font-size:7px;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.55);padding:5px 8px;cursor:pointer;
  display:none;
  -webkit-tap-highlight-color:transparent;
}
#drag-mode-btn.visible{display:block}
#drag-mode-btn.drag-on{color:#ffe066;border-color:#ffe06688;background:rgba(180,120,0,.2)}
</style>
</head>
<body>

<!-- Portrait rotate prompt -->
<div id="rotate-msg">
  <span>📱</span>
  <p>ROTATE TO LANDSCAPE<br>TO PLAY</p>
</div>

<div id="app">

<!-- ════════════════════════════════════
     HOME SCREEN
════════════════════════════════════ -->
<div class="screen active" id="home-screen">
  <div class="home-title-wrap">
    <span class="home-eyebrow">— Pixel Adventure —</span>
    <span class="home-title">PIXEL<br>MEHEDI</span>
    <span class="home-sub">⚔ 10 LEVELS · SHOOT · SURVIVE ⚔</span>
  </div>
  <nav class="menu-list">
    <button class="menu-btn" id="btn-start">START GAME</button>
    <button class="menu-btn" id="btn-opts">OPTIONS</button>
    <button class="menu-btn danger" id="btn-quit">QUIT</button>
  </nav>
</div>

<!-- ════════════════════════════════════
     OPTIONS SCREEN
════════════════════════════════════ -->
<div class="screen" id="options-screen">
  <div class="screen-header">
    <button class="back-btn" data-back="home-screen">◀ BACK</button>
    <span class="screen-title">OPTIONS</span>
  </div>
  <div class="opt-list">
    <button class="opt-btn" id="go-gamepad">
      GAMEPAD SETTINGS
      <span class="opt-val">▶</span>
    </button>
    <button class="opt-btn" id="go-character">
      CHANGE CHARACTER
      <span class="opt-val" id="opt-char-val">HERO</span>
    </button>
    <button class="opt-btn" id="go-level">
      GAME LEVEL
      <span class="opt-val" id="opt-level-val">EASY</span>
    </button>
  </div>
</div>

<!-- ════════════════════════════════════
     GAMEPAD SETTINGS
════════════════════════════════════ -->
<div class="screen" id="gamepad-screen">
  <div class="screen-header">
    <button class="back-btn" data-back="options-screen">◀ BACK</button>
    <span class="screen-title">GAMEPAD</span>
  </div>
  <div class="gp-opt-grid">
    <div class="gp-opt-row">
      <span class="gp-opt-label">BUTTON SIZE</span>
      <div class="slider-wrap">
        <input type="range" id="gp-size-slider" min="44" max="100" value="64">
        <span class="slider-val" id="gp-size-val">64</span>
      </div>
    </div>
    <div class="gp-opt-row">
      <span class="gp-opt-label">OPACITY</span>
      <div class="slider-wrap">
        <input type="range" id="gp-opacity-slider" min="20" max="100" value="75">
        <span class="slider-val" id="gp-opacity-val">75%</span>
      </div>
    </div>
    <div class="gp-opt-row">
      <span class="gp-opt-label">HAPTIC</span>
      <button class="toggle-btn" id="haptic-toggle" data-on="true">ON</button>
    </div>
    <div class="gp-opt-row">
      <span class="gp-opt-label">DRAG MODE</span>
      <span class="opt-val" style="font-size:7px;color:#a88bff">IN-GAME: hold EDIT btn</span>
    </div>
    <div class="gp-opt-row">
      <button class="save-btn" id="gp-reset-btn" style="font-size:8px;padding:10px 20px">RESET POSITIONS</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════
     CHARACTER SCREEN
════════════════════════════════════ -->
<div class="screen" id="character-screen">
  <div class="screen-header">
    <button class="back-btn" data-back="options-screen">◀ BACK</button>
    <span class="screen-title">CHARACTER</span>
  </div>
  <div class="name-edit-wrap">
    <span class="opt-label">WARRIOR NAME</span>
    <input id="char-name-input" type="text" maxlength="12" placeholder="ENTER NAME" autocomplete="off" spellcheck="false">
    <button class="save-btn" id="save-char-btn">SAVE NAME</button>
  </div>
</div>

<!-- ════════════════════════════════════
     GAME LEVEL SCREEN
════════════════════════════════════ -->
<div class="screen" id="level-screen">
  <div class="screen-header">
    <button class="back-btn" data-back="options-screen">◀ BACK</button>
    <span class="screen-title">DIFFICULTY</span>
  </div>
  <div class="level-grid">
    <button class="lv-btn chosen" data-l="easy">😊<br>EASY<br><span style="font-size:5px;opacity:.7">5 LIVES</span></button>
    <button class="lv-btn" data-l="medium">😤<br>MEDIUM<br><span style="font-size:5px;opacity:.7">3 LIVES</span></button>
    <button class="lv-btn" data-l="hard">💀<br>HARD<br><span style="font-size:5px;opacity:.7">2 LIVES</span></button>
  </div>
</div>

<!-- ════════════════════════════════════
     GAME SCREEN
════════════════════════════════════ -->
<div class="screen" id="game-screen">
  <div id="canvas-box">
    <canvas id="c"></canvas>

    <!-- HUD -->
    <div id="hud">

function clusterPointerDown(e, cl) {
  if (!dragMode) return;
  e.preventDefault(); e.stopPropagation();
  const touch = e.touches ? e.touches[0] : e;
  dragging = {
    el: cl,
    ox: touch.clientX - cl.offsetLeft,
    oy: touch.clientY - cl.offsetTop,
  };
}
function clusterPointerMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const box = document.getElementById('canvas-box');
  const bw = box.offsetWidth, bh = box.offsetHeight;
  let nx = touch.clientX - dragging.ox;
  let ny = touch.clientY - dragging.oy;
  nx = Math.max(0, Math.min(bw - dragging.el.offsetWidth, nx));
  ny = Math.max(0, Math.min(bh - dragging.el.offsetHeight, ny));
  dragging.el.style.left = nx + 'px';
  dragging.el.style.top = ny + 'px';
  dragging.el.style.right = 'auto';
  dragging.el.style.bottom = 'auto';
}
function clusterPointerUp() { dragging = null; }

function resizePointerDown(e, clId) {
  if (!dragMode) return;
  e.preventDefault(); e.stopPropagation();
  const cl = document.getElementById(clId);
  const touch = e.touches ? e.touches[0] : e;
  resizing = { cl, startX: touch.clientX, startY: touch.clientY, startW: cl.offsetWidth, startH: cl.offsetHeight };
}
function resizePointerMove(e) {
  if (!resizing) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const dx = touch.clientX - resizing.startX, dy = touch.clientY - resizing.startY;
  const nw = Math.max(80, resizing.startW + dx);
  const nh = Math.max(80, resizing.startH + dy);
  resizing.cl.style.width = nw + 'px';
  resizing.cl.style.height = nh + 'px';
}
function resizePointerUp() { resizing = null; }

document.addEventListener('touchmove', e => { clusterPointerMove(e); resizePointerMove(e); }, { passive: false });
document.addEventListener('mousemove', e => { clusterPointerMove(e); resizePointerMove(e); });
document.addEventListener('touchend', () => { clusterPointerUp(); resizePointerUp(); });
document.addEventListener('mouseup', () => { clusterPointerUp(); resizePointerUp(); });

document.querySelectorAll('.gp-cluster').forEach(cl => {

// ═══════════════════════════════════════════════════════════════
//  LEVEL GENERATOR
// ═══════════════════════════════════════════════════════════════
function rni(a, b) { return Math.floor(a + Math.random() * (b - a)); }
function shuffle(a) { for (let i = a.length-1; i > 0; i--) { const j = rni(0,i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function genLevel(lvNum) {
  const ti = lvNum - 1;
  const theme = THEMES[ti], etype = ETYPES[ti];
  const diff = 1 + ti * 0.10;
  const ROWS_P = [ROWS-5, ROWS-7, ROWS-9];
  const grid = Array.from({length:ROWS}, () => Array(COLS).fill(0));
  for (let r = ROWS-3; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = 1;
  const nGaps = ti > 1 ? Math.min(ti-1, 4) : 0;
  for (let g = 0; g < nGaps; g++) {
    const gc = 8 + rni(0, COLS-18), gw = 2 + rni(0, 2);
    for (let c = gc; c < gc+gw && c < COLS-5; c++) for (let r = ROWS-3; r < ROWS; r++) grid[r][c] = 0;
  }
  let lr = ROWS-4, lc = 2;
  for (let i = 0; i < 8+ti; i++) {
    const rowOpts = ROWS_P.filter(r => Math.abs(r-lr) <= 4);
    const row = rowOpts.length > 0 ? rowOpts[rni(0, rowOpts.length)] : ROWS_P[0];
    const minC = Math.max(2, lc+2), maxC = Math.min(COLS-10, lc+10);
    if (minC >= maxC) { lc = 2; continue; }
    const col = rni(minC, maxC), len = rni(4, 9);
    let ok = true;
    for (let c2 = col; c2 < col+len && c2 < COLS-1; c2++) if (grid[row]?.[c2] !== 0) { ok = false; break; }
    if (ok) { for (let c2 = col; c2 < col+len && c2 < COLS-1; c2++) grid[row][c2] = 1; lr = row; lc = col+len; }
  }
  const cC = [];
  for (let r = 1; r < ROWS-2; r++) for (let c = 2; c < COLS-1; c++) if (grid[r][c]===0 && grid[r+1]?.[c]===1) cC.push([r,c]);
  shuffle(cC).slice(0, 6+ti*2).forEach(([r,c]) => { if (grid[r][c]===0) grid[r][c]=2; });
  const eC = [];
  for (let r = 1; r < ROWS-3; r++) for (let c = 6; c < COLS-3; c++) if (grid[r][c]===0 && (grid[r+1]?.[c]===1 || etype.fly)) eC.push([r,c]);
  shuffle(eC).slice(0, 2+Math.floor(ti*1.4)).forEach(([r,c]) => { if (grid[r][c]===0) grid[r][c]=3; });
  if (ti > 2) {
    const sC = [];
    for (let c = 6; c < COLS-3; c++) if (grid[ROWS-4][c]===0 && grid[ROWS-3][c]===1) sC.push([ROWS-4,c]);
    shuffle(sC).slice(0, ti*2).forEach(([r,c]) => { if (grid[r][c]===0) grid[r][c]=4; });
  }
  let fp = false;
  for (let c = COLS-4; c >= COLS-12 && !fp; c--) for (let r = ROWS-5; r < ROWS-2 && !fp; r++) if (grid[r][c]===0 && grid[r+1]?.[c]===1) { grid[r][c]=5; fp=true; }
  if (!fp) grid[ROWS-4][COLS-4] = 5;
  const platforms=[], coins=[], enemies=[], spikes=[];
  let flagPos=null;
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    const x=c*TILE, y=r*TILE, v=grid[r][c];
    if (v===1) platforms.push({x,y,w:TILE,h:TILE});
    if (v===2) coins.push({x:x+4,y:y+4,w:12,h:12,got:false,anim:Math.random()*Math.PI*2});
    if (v===3) { const sp=etype.bs*diff*cfg.eSpd*(0.8+Math.random()*0.4); enemies.push(mkEnemy(etype,x,y,sp,lvNum)); }
    if (v===4) spikes.push({x:x+2,y:y+6,w:TILE-4,h:TILE-6});
    if (v===5) flagPos={x,y};
  }
  return {platforms,coins,enemies,spikes,flagPos,theme,etype};
}

function mkEnemy(type, x, y, spd, lv) {
  const w=Math.round(TILE*type.sz), h=Math.round(14*type.sz), ey=y-h+TILE;
  return { type,x,y:ey,w,h,vx:spd,vy:0,dir:Math.random()<0.5?1:-1,hp:type.hp,maxHp:type.hp,onGround:false,dead:false,anim:Math.random()*Math.PI*2,flicker:0,flyBase:ey,flyAmp:22+Math.random()*28,flySpd:0.022+Math.random()*0.018,flyT:Math.random()*Math.PI*2,shootCd:60+rni(0,60),lv };
}

let state=null, cfg=null, wpn=null;
let platforms=[], coins=[], enemies=[], spikes=[], flagPos=null;
let theme=THEMES[0], etype=ETYPES[0];

function initGame() {

function loadLevel(n) {

// ── PHYSICS ──────────────────────────────────────────────────
function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function resY(o,pl){
  for(const p of pl){
    if(o.x+2<p.x+p.w&&o.x+o.w-2>p.x){
      if(o.vy>=0&&o.y+o.h>p.y&&o.y+o.h<p.y+p.h+Math.abs(o.vy)+2){o.y=p.y-o.h;o.vy=0;o.onGround=true}
      else if(o.vy<0&&o.y<p.y+p.h&&o.y>p.y+o.vy-2){o.y=p.y+p.h;o.vy=0}
    }
  }
}
function resX(o,pl){
  for(const p of pl){
    if(o.y+2<p.y+p.h&&o.y+o.h-2>p.y){
      if(o.vx>0&&o.x+o.w>p.x&&o.x+o.w<p.x+p.w+Math.abs(o.vx)+2){o.x=p.x-o.w;o.vx=0}
      else if(o.vx<0&&o.x<p.x+p.w&&o.x>p.x+o.vx-2){o.x=p.x+p.w;o.vx=0}
    }
  }
}

// ── PARTICLES ────────────────────────────────────────────────
function spawnParts(x,y,col,n,spd){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2;parts.push({x,y,vx:Math.cos(a)*spd*(0.5+Math.random()),vy:Math.sin(a)*spd*(0.5+Math.random()),col,life:14+rni(0,10),maxLife:24})}
}

// ── SHOOT ────────────────────────────────────────────────────
function doShoot(){
  if(!player||player.dead||!state||state.phase!=='play'||paused)return;
  if(player.scd>0)return;
  player.scd=wpn.cd;
  const bx=player.dir>0?player.x+player.w:player.x-wpn.sz;
  pBullets.push({x:bx,y:player.y+player.h/2-wpn.sz/2,w:wpn.sz,h:wpn.sz,vx:wpn.spd*player.dir,vy:0,dmg:wpn.dmg,col:wpn.col,tr:wpn.tr,dead:false,life:70+Math.round(180/wpn.spd)});
  spawnParts(bx,player.y+player.h/2,wpn.col,4,2);
}

// ── UPDATE ───────────────────────────────────────────────────
function updPlayer(){
  if(player.dead)return;
  const L=keys.ArrowLeft||keys.a||keys.A||inp.left;
  const R=keys.ArrowRight||keys.d||keys.D||inp.right;
  const J=keys.ArrowUp||keys.w||keys.W||keys[' ']||inp.jump;
  if(L){player.vx=-cfg.spd;player.dir=-1}
  else if(R){player.vx=cfg.spd;player.dir=1}
  else player.vx*=0.72;
  if(J)player.jBuf=10;
  if(player.jBuf>0)player.jBuf--;
  if(player.onGround)player.coy=10;else if(player.coy>0)player.coy--;
  if(player.jBuf>0&&player.coy>0){player.vy=cfg.jmp;player.jBuf=0;player.coy=0;spawnParts(player.x+8,player.y+player.h,'#aaffff',5,2)}
  player.vy=Math.min(player.vy+cfg.grav,14);
  player.onGround=false;
  player.x+=player.vx;player.x=Math.max(0,Math.min(WORLD_W-player.w,player.x));
  resX(player,platforms);player.y+=player.vy;resY(player,platforms);
  if(player.onGround&&Math.abs(player.vx)>0.3)player.anim+=0.18;
  player.blinkT--;if(player.blinkT<=0)player.blinkT=80+rni(0,100);
  if(player.inv>0)player.inv--;
  if(player.scd>0)player.scd--;
  if(shootPending){shootPending=false;doShoot()}
  if(player.y>GH+80)killPlayer();
  if(player.inv<=0){
    spikes.forEach(s=>{if(ov(player,s))killPlayer()});
    eBullets.forEach(b=>{if(!b.dead&&ov(player,{x:b.x,y:b.y,w:b.w,h:b.h})){b.dead=true;killPlayer()}});
  }
  coins.forEach(c=>{if(!c.got&&ov(player,c)){c.got=true;state.score+=100*state.level;spawnParts(c.x+6,c.y+6,'#ffe066',6,3);updateHUD()}});
  enemies.forEach(e=>{
    if(e.dead||!ov(player,e)||player.inv>0)return;
    if(player.vy>1&&player.y+player.h<e.y+e.h*0.6){e.hp--;spawnParts(e.x+e.w/2,e.y,e.type.col,8,4);if(e.hp<=0){e.dead=true;state.score+=300*state.level;updateHUD()}else e.flicker=35;player.vy=-7.5}
    else killPlayer();
  });
  if(flagPos&&coins.every(c=>c.got)){if(ov(player,{x:flagPos.x+2,y:flagPos.y-44,w:22,h:64})){state.phase='win';state.winT=130;state.winLocked=true}}
}

function updEnemies(){
  enemies.forEach(e=>{
    if(e.dead)return;
    if(e.flicker>0)e.flicker--;
    if(e.type.fly){
      e.flyT+=e.flySpd*(1+e.lv*0.05);
      e.y=e.flyBase+Math.sin(e.flyT)*e.flyAmp;
      if(e.type.chase&&player&&!player.dead){const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;e.x+=dx/d*e.vx;e.dir=dx>0?1:-1}
      else{e.x+=e.vx*e.dir;if(e.x<=0||e.x+e.w>=WORLD_W)e.dir*=-1}
    }else{
      e.vy=Math.min(e.vy+0.44,14);
      if(e.type.chase&&player&&!player.dead)e.dir=(player.x>e.x)?1:-1;
      e.x+=e.vx*e.dir;e.onGround=false;
      const pvx=e.vx;resX(e,platforms);if(e.vx===0&&pvx!==0)e.dir*=-1;
      e.y+=e.vy;resY(e,platforms);
      if(e.x<=0||e.x+e.w>=WORLD_W)e.dir*=-1;
      if(e.type.jmp&&e.onGround&&player&&!player.dead&&Math.abs(player.x-e.x)<130&&Math.random()<0.02)e.vy=-(7+e.lv*0.25);
    }
    e.anim+=0.14;
    if(e.type.shoot&&player&&!player.dead){
      e.shootCd--;
      if(e.shootCd<=0){e.shootCd=Math.max(30,80-e.lv*5);const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1,sp=2.5+e.lv*0.2;eBullets.push({x:e.x+e.w/2-3,y:e.y+e.h/2-3,w:6,h:6,vx:dx/d*sp,vy:dy/d*sp,col:e.type.col,dead:false,life:130})}
    }
  });
}

function updBullets(){
  pBullets.forEach(b=>{
    if(b.dead)return;b.x+=b.vx;b.life--;
    if(b.life<=0||b.x<-20||b.x>WORLD_W+20){b.dead=true;return}
    for(const p of platforms)if(ov({x:b.x,y:b.y,w:b.w,h:b.h},p)){b.dead=true;spawnParts(b.x,b.y,b.col,3,2);break}
    if(!b.dead)enemies.forEach(e=>{if(e.dead)return;if(ov({x:b.x,y:b.y,w:b.w,h:b.h},e)){b.dead=true;e.hp-=b.dmg;spawnParts(b.x,b.y,e.type.col,6,3);if(e.hp<=0){e.dead=true;state.score+=300*state.level;updateHUD()}else e.flicker=35}});
  });
  pBullets=pBullets.filter(b=>!b.dead);
  eBullets.forEach(b=>{
    if(b.dead)return;b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0||b.x<-40||b.x>WORLD_W+40||b.y<-40||b.y>GH+40)b.dead=true;
    if(!b.dead)for(const p of platforms)if(ov({x:b.x,y:b.y,w:b.w,h:b.h},p)){b.dead=true;break}
  });
  eBullets=eBullets.filter(b=>!b.dead);
}

function updParts(){
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life--});
  parts=parts.filter(p=>p.life>0);
}

function updCam(){
  const tx=player.x-640/2+player.w/2;
  state.camX+=(tx-state.camX)*0.13;
  state.camX=Math.max(0,Math.min(WORLD_W-640,state.camX));
}

function killPlayer(){
  if(player.dead||player.inv>0)return;
  player.dead=true;player.vy=-8;spawnParts(player.x+8,player.y+10,'#ff4466',12,4);
  state.lives--;updateHUD();state.deathT=120;
}

function advanceLevel(){state.level++;state.phase='play';state.winT=0;state.winLocked=true;pBullets=[];eBullets=[];parts=[];loadLevel(state.level)}
function doRestart(){state.score=0;state.lives=cfg.lives;state.level=1;state.phase='play';state.deathT=0;state.winT=0;pBullets=[];eBullets=[];parts=[];loadLevel(1);updateHUD()}

// ═══════════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════════
function S(v){return v*GW/640} // scale x
function T(v){return v*GH/360} // scale y

function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,theme.skyA);g.addColorStop(.5,theme.skyB);g.addColorStop(1,theme.skyC);
  ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
  const t=state.tick;
  for(let i=0;i<80;i++){
    const ss=((i*139+state.camX*S(.08))%GW+GW)%GW;
    const sy=((i*53)%(GH*.72));
    const pulse=0.5+Math.sin(t*.04+i*.7)*.4;
    ctx.globalAlpha=pulse*.85;ctx.fillStyle=theme.starC;
    ctx.fillRect(~~ss,~~sy,i%7===0?Math.round(S(2)):Math.round(S(1)),i%7===0?Math.round(T(2)):Math.round(T(1)));
  }
  ctx.globalAlpha=1;
  drawHills(state.camX*.15,theme.hillB,GH*.72,10,T(28),T(80));
  drawHills(state.camX*.28,theme.hillA,GH*.79,14,T(20),T(55));
  const fog=ctx.createLinearGradient(0,GH*.6,0,GH);
  fog.addColorStop(0,'transparent');fog.addColorStop(1,theme.fog||'rgba(0,0,0,.1)');
  ctx.fillStyle=fog;ctx.fillRect(0,GH*.6,GW,GH*.4);
}

function drawHills(camOff,col,baseY,cnt,minH,maxH){
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(0,GH);
  const seed=col.charCodeAt(1)||50;
  for(let i=0;i<=cnt+1;i++){
    const bx=(i/cnt)*GW*2.5-(camOff%GW);
    const hh=minH+((seed*i*137+i*i*23)%1000)/1000*(maxH-minH);
    const by=baseY-hh;
    if(i===0)ctx.lineTo(bx,by);
    else{const px=((i-.5)/cnt*GW*2.5-camOff%GW);ctx.quadraticCurveTo(px,by+T(8),bx,by)}
  }
  ctx.lineTo(GW,GH);ctx.closePath();ctx.fill();
}

function drawPlatforms(){
  const sc=GW/640,sh=GH/360;
  platforms.forEach(p=>{
    const px=Math.round((p.x-state.camX)*sc),py=Math.round(p.y*sh);
    const pw=Math.round(p.w*sc),ph=Math.round(p.h*sh);
    if(px>GW+4||px+pw<-4)return;
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(px+Math.round(2*sc),py+ph,pw,Math.round(3*sh));
    ctx.fillStyle=theme.pBot;ctx.fillRect(px,py+Math.round(5*sh),pw,ph-Math.round(5*sh));
    ctx.fillStyle=theme.pMid;ctx.fillRect(px,py+Math.round(3*sh),pw,ph-Math.round(6*sh));
    ctx.fillStyle=theme.pTop;ctx.fillRect(px,py,pw,Math.round(6*sh));
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(px,py,pw,Math.round(2*sh));
    ctx.fillStyle='rgba(255,255,255,.06)';
    for(let i=0;i<pw;i+=Math.round(4*sc))ctx.fillRect(px+i,py+Math.round(2*sh),Math.round(2*sc),Math.round(sh));
  });
}

function drawSpikes(){
  const sc=GW/640,sh=GH/360;
  spikes.forEach(s=>{
    const sx=Math.round((s.x-state.camX)*sc);if(sx>GW||sx+s.w*sc<0)return;
    const sy=Math.round(s.y*sh),sw=Math.round(s.w*sc),hs=Math.round(s.h*sh);
    ctx.fillStyle='#bb8822';
    for(let i=0;i<2;i++){const tw=sw/2;ctx.beginPath();ctx.moveTo(sx+i*tw,sy+hs);ctx.lineTo(sx+i*tw+tw/2,sy);ctx.lineTo(sx+i*tw+tw,sy+hs);ctx.closePath();ctx.fill();ctx.fillStyle='#ffe066';ctx.fillRect(sx+i*tw+Math.round(tw/2)-1,sy,Math.round(2*sc),Math.round(4*sh));ctx.fillStyle='#bb8822'}
  });
}

function drawFlag(){
  if(!flagPos)return;
  const sc=GW/640,sh=GH/360;
  const fx=Math.round((flagPos.x-state.camX)*sc),fy=Math.round(flagPos.y*sh);
  const ready=coins.every(c=>c.got);
  const ph=Math.round(56*sh);
  ctx.fillStyle='#aaa';ctx.fillRect(fx+Math.round(8*sc),fy-ph,Math.round(3*sc),ph+Math.round(TILE*sh));
  const wave=ready?Math.sin(state.tick*.13)*Math.round(5*sc):0;
  ctx.fillStyle=ready?'#ff3366':'#334455';
  ctx.beginPath();ctx.moveTo(fx+Math.round(11*sc),fy-ph+Math.round(4*sh));ctx.lineTo(fx+Math.round(30*sc)+wave,fy-ph+Math.round(14*sh));ctx.lineTo(fx+Math.round(11*sc),fy-ph+Math.round(24*sh));ctx.closePath();ctx.fill();
  ctx.fillStyle=ready?'#ffe066':'rgba(160,180,255,.6)';
  ctx.font=`${Math.round(6*sc)}px "Press Start 2P"`;ctx.textAlign='center';
  ctx.fillText(ready?'GO!':'COINS',fx+Math.round(12*sc),fy-ph-Math.round(6*sh));
}

function drawCoins(){
  const sc=GW/640,sh=GH/360,t=state.tick;
  coins.forEach(c=>{
    if(c.got)return;
    const cx=Math.round((c.x-state.camX)*sc);if(cx<-20||cx>GW+20)return;
    const bob=Math.round(Math.sin(t*.05+c.anim)*3*sh);
    const cy=Math.round(c.y*sh)+bob,cw=Math.round(c.w*sc),ch=Math.round(c.h*sh);
    ctx.fillStyle='#ffe066';ctx.fillRect(cx+Math.round(2*sc),cy,cw-Math.round(4*sc),ch);ctx.fillRect(cx,cy+Math.round(2*sh),cw,ch-Math.round(4*sh));
    ctx.fillStyle='#fffacd';ctx.fillRect(cx+Math.round(2*sc),cy+Math.round(sh),Math.round(4*sc),Math.round(3*sh));
    ctx.fillStyle='#b8730a';
    ctx.fillRect(cx,cy+Math.round(2*sh),Math.round(2*sc),ch-Math.round(4*sh));ctx.fillRect(cx+cw-Math.round(2*sc),cy+Math.round(2*sh),Math.round(2*sc),ch-Math.round(4*sh));
    ctx.fillRect(cx+Math.round(2*sc),cy,cw-Math.round(4*sc),Math.round(2*sh));ctx.fillRect(cx+Math.round(2*sc),cy+ch-Math.round(2*sh),cw-Math.round(4*sc),Math.round(2*sh));
  });
}

function drawEnemies(){
  const sc=GW/640,sh=GH/360;
  enemies.forEach(e=>{
    if(e.dead)return;
    if(e.flicker>0&&Math.floor(e.flicker/4)%2===0)return;
    const ex=Math.round((e.x-state.camX)*sc);if(ex>GW+80||ex+e.w*sc<-80)return;
    const ey=Math.round(e.y*sh),ew=Math.round(e.w*sc),eh=Math.round(e.h*sh);
    ctx.save();
    if(e.maxHp>1){ctx.fillStyle='#300';ctx.fillRect(ex-1,ey-Math.round(9*sh),ew+2,Math.round(4*sh));ctx.fillStyle=e.hp/e.maxHp>.5?'#4f4':'#ffaa00';ctx.fillRect(ex-1,ey-Math.round(9*sh),Math.round((ew+2)*e.hp/e.maxHp),Math.round(4*sh))}
    ctx.fillStyle=e.type.dk;ctx.fillRect(ex,ey+Math.round(4*sh),ew,eh-Math.round(4*sh));
    ctx.fillStyle=e.type.col;ctx.fillRect(ex+Math.round(2*sc),ey,ew-Math.round(4*sc),eh-Math.round(2*sh));
    if(e.type.fly){ctx.globalAlpha=.5+Math.sin(state.tick*.08+e.anim)*.35;ctx.fillStyle=e.type.col;ctx.fillRect(ex,ey,ew,eh);ctx.globalAlpha=1}
    const eox=e.dir>0?Math.round(ew*.58):Math.round(ew*.1);
    ctx.fillStyle=e.type.ey;ctx.fillRect(ex+eox,ey+Math.round(4*sh),Math.round(4*sc),Math.round(4*sh));
    ctx.fillStyle='rgba(255,255,255,.8)';ctx.fillRect(ex+eox+Math.round(sc),ey+Math.round(5*sh),Math.round(sc),Math.round(sh));
    ctx.restore();
  });
  eBullets.forEach(b=>{if(b.dead)return;const bx=Math.round((b.x-state.camX)*(GW/640));ctx.fillStyle=b.col;ctx.fillRect(bx,Math.round(b.y*(GH/360)),Math.round(6*(GW/640)),Math.round(6*(GH/360)));ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillRect(bx+1,Math.round(b.y*(GH/360))+1,Math.round(2*(GW/640)),Math.round(2*(GH/360)))});
}

function drawBullets(){
  const sc=GW/640,sh=GH/360;
  pBullets.forEach(b=>{
    const bx=Math.round((b.x-state.camX)*sc),bw=Math.round(b.w*sc),bh=Math.round(b.h*sh);
    ctx.fillStyle=b.tr;ctx.fillRect(bx-(b.vx>0?bw*2:0),Math.round(b.y*sh),bw*2,bh);
    ctx.fillStyle=b.col;ctx.fillRect(bx,Math.round(b.y*sh),bw,bh);
    ctx.fillStyle='#fff';ctx.fillRect(bx+1,Math.round(b.y*sh)+1,Math.max(1,bw-2),Math.max(1,bh-2));
  });
}

function drawParts(){
  const sc=GW/640,sh=GH/360;
  parts.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.col;ctx.fillRect(Math.round((p.x-state.camX)*sc),Math.round(p.y*sh),Math.round(3*sc),Math.round(3*sh))});
  ctx.globalAlpha=1;
}

function drawPlayer(){
  if(!player)return;
  const sc=GW/640,sh=GH/360,t=state.tick;
  const px=Math.round((player.x-state.camX)*sc),py=Math.round(player.y*sh);
  const pw=Math.round(player.w*sc),ph=Math.round(player.h*sh);
  const d=player.dir,blink=player.blinkT<5;
  if(player.dead){ctx.save();ctx.globalAlpha=.45+Math.sin(t*.2)*.45}
  if(player.inv>0&&Math.floor(player.inv/4)%2===1){ctx.save();ctx.globalAlpha=.3}
  if(player.onGround){ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(px+pw/2,py+ph+Math.round(2*sh),Math.round(9*sc),Math.round(3*sh),0,0,Math.PI*2);ctx.fill()}
  ctx.fillStyle='#111';ctx.fillRect(px-Math.round(sc),py+Math.round(16*sh),Math.round(8*sc),Math.round(5*sh));ctx.fillRect(px+Math.round(9*sc),py+Math.round(16*sh),Math.round(8*sc),Math.round(5*sh));
  ctx.fillStyle='#2255cc';ctx.fillRect(px+Math.round(2*sc),py+Math.round(8*sh),Math.round(12*sc),Math.round(10*sh));
  ctx.fillStyle='#4488ff';ctx.fillRect(px+Math.round(4*sc),py+Math.round(9*sh),Math.round(5*sc),Math.round(3*sh));
  ctx.fillStyle='#ffcc88';ctx.fillRect(px+Math.round(sc),py,Math.round(14*sc),Math.round(10*sh));
  ctx.fillStyle='#bb1111';ctx.fillRect(px,py-Math.round(5*sh),Math.round(16*sc),Math.round(6*sh));ctx.fillRect(px+Math.round(3*sc),py-Math.round(9*sh),Math.round(10*sc),Math.round(5*sh));
  ctx.fillStyle='#ffe066';ctx.font=`bold ${Math.round(6*sc)}px "Press Start 2P"`;ctx.textAlign='left';ctx.fillText('M',px+Math.round(4*sc),py-Math.round(sh));
  ctx.fillStyle='#222';
  const ex=d>0?px+Math.round(9*sc):px+Math.round(3*sc);
  if(!blink){ctx.fillRect(ex,py+Math.round(3*sh),Math.round(3*sc),Math.round(3*sh));ctx.fillStyle='#fff';ctx.fillRect(ex+(d>0?Math.round(sc):0),py+Math.round(3*sh),Math.round(sc),Math.round(sc))}
  else ctx.fillRect(ex,py+Math.round(5*sh),Math.round(3*sc),Math.round(sh));
  ctx.fillStyle=wpn?wpn.col:'#44ffcc';
  if(d>0){ctx.fillRect(px+Math.round(14*sc),py+Math.round(9*sh),Math.round(8*sc),Math.round(4*sh));ctx.fillRect(px+Math.round(18*sc),py+Math.round(7*sh),Math.round(4*sc),Math.round(4*sh))}
  else{ctx.fillRect(px-Math.round(8*sc),py+Math.round(9*sh),Math.round(8*sc),Math.round(4*sh));ctx.fillRect(px-Math.round(8*sc),py+Math.round(7*sh),Math.round(4*sc),Math.round(4*sh))}
  if(player.onGround&&Math.abs(player.vx)>.3){const arm=Math.round(Math.sin(player.anim*2)*2*sh);ctx.fillStyle='#ffcc88';ctx.fillRect(d>0?px-Math.round(2*sc):px+Math.round(14*sc),py+Math.round(8*sh)+arm,Math.round(4*sc),Math.round(5*sh))}
  if(player.dead||player.inv>0)ctx.restore();
}

function drawHUD2(){
  const sc=GW/640,sh=GH/360;
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,GH-Math.round(14*sh),GW,Math.round(14*sh));
  ctx.fillStyle='#3a4a5a';ctx.font=`${Math.round(5*sc)}px "Press Start 2P"`;ctx.textAlign='center';
  ctx.fillText('← → MOVE  ↑/SPACE JUMP  F/Z SHOOT  ESC PAUSE',GW/2,GH-Math.round(4*sh));
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,GW,Math.round(15*sh));
  ctx.fillStyle='#a88bff';ctx.font=`${Math.round(6*sc)}px "Press Start 2P"`;ctx.textAlign='center';
  ctx.fillText(theme.name,GW/2,Math.round(11*sh));
  const got=coins.filter(c=>c.got).length,tot=coins.length;
  ctx.fillStyle='#ffe066';ctx.textAlign='left';ctx.fillText(`C:${got}/${tot}`,Math.round(4*sc),Math.round(11*sh));
  ctx.fillStyle=etype.col;ctx.textAlign='right';ctx.fillText(etype.id.toUpperCase(),GW-Math.round(4*sc),Math.round(11*sh));
}

function drawWinFx(){
  for(let i=0;i<28;i++){const a=(i/28)*Math.PI*2+state.tick*.055,r=(55+Math.sin(state.tick*.055+i)*28)*(GW/640);ctx.fillStyle=['#ffe066','#ff4466','#44ffcc','#4488ff','#ff88ff','#fff'][i%6];ctx.fillRect(~~(GW/2+Math.cos(a)*r),~~(GH/2+Math.sin(a)*r*.55),Math.round(4*(GW/640)),Math.round(4*(GH/360)))}
}

function drawMsg(title,lines,col){
  const sc=GW/640,sh=GH/360;
  ctx.fillStyle='rgba(3,3,18,.88)';ctx.fillRect(0,0,GW,GH);
  ctx.strokeStyle=col||'#7b4fff';ctx.lineWidth=Math.round(2*sc);ctx.strokeRect(Math.round(50*sc),Math.round(55*sh),GW-Math.round(100*sc),GH-Math.round(110*sh));
  ctx.fillStyle=col||'#ffe066';ctx.font=`${Math.round(16*sc)}px "Press Start 2P"`;ctx.textAlign='center';
  ctx.fillText(title,GW/2,GH/2-Math.round(34*sh));
  ctx.fillStyle='#c0d0ff';ctx.font=`${Math.round(8*sc)}px "Press Start 2P"`;
  (lines||[]).forEach((l,i)=>ctx.fillText(l,GW/2,GH/2+Math.round(i*20*sh)));
}

// ── MAIN LOOP ────────────────────────────────────────────────
function loop(){
  if(!running)return;
  requestAnimationFrame(loop);
  if(paused)return;
  ctx.imageSmoothingEnabled=false;
  state.tick++;
  if(state.phase==='play'){
    updPlayer();updEnemies();updBullets();updParts();updCam();
    if(state.deathT>0){state.deathT--;if(state.deathT===0){if(state.lives<=0)state.phase='gameover';else loadLevel(state.level)}}
  }
  if(state.phase==='win'){updCam();state.winT--;if(state.winT<=60)state.winLocked=false}
  drawBg();drawPlatforms();drawSpikes();drawFlag();drawCoins();drawEnemies();drawBullets();drawParts();drawPlayer();drawHUD2();
  if(state.phase==='gameover')drawMsg('GAME OVER',['SCORE: '+state.score,'PRESS R TO RESTART','OR TAP SCREEN'],'#ff4466');
  if(state.phase==='win'){
    drawWinFx();
    if(state.level<MAX_LV){drawMsg('LEVEL CLEAR!',['SCORE: '+state.score,'PRESS ENTER/SPACE','OR TAP TO CONTINUE'],'#44ffcc');if(!state.winLocked&&(keys['Enter']||keys[' ']||keys.ArrowUp))advanceLevel()}
    else drawMsg('YOU WIN! 🏆',['FINAL SCORE: '+state.score,'ALL 10 LEVELS CLEARED!','PRESS R TO PLAY AGAIN'],'#ffe066');
  }
}

document.addEventListener('keydown',e=>{
  if(!state||!running)return;
  if((e.key==='Enter'||e.key===' ')&&state.phase==='win'&&!state.winLocked&&state.level<MAX_LV){e.preventDefault();advanceLevel()}
});
</script>
