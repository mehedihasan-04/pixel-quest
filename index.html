<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PIXEL MEHEDI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#060810;
  overflow:hidden;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  -webkit-user-select:none;
}

/* ────────────────────────────────────────
   ROTATE SCREEN (portrait phones/tablets)
──────────────────────────────────────── */
#rotate-msg{
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:#060810;
  flex-direction:column;align-items:center;justify-content:center;gap:24px;
}
#rotate-msg .r-icon{font-size:56px;animation:rotateAnim 2s ease-in-out infinite}
@keyframes rotateAnim{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
#rotate-msg p{
  font-family:'Press Start 2P',monospace;font-size:11px;
  color:#ffe066;text-align:center;line-height:2.2;padding:0 24px;
}
@media (max-width:768px) and (orientation:portrait){
  #rotate-msg{display:flex}
  #app{display:none!important}
}

/* ────────────────────────────────────────
   APP ROOT
──────────────────────────────────────── */
#app{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
}

/* ────────────────────────────────────────
   START SCREEN
──────────────────────────────────────── */
#start-screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
  overflow:hidden;
  background:linear-gradient(180deg,#060810 0%,#0d1030 50%,#060810 100%);
  z-index:100;
}

/* animated star field */
#start-screen::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle 1px at 12% 18%,rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(circle 1px at 28% 8%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(circle 2px at 45% 22%,rgba(255,210,80,0.8)  0%,transparent 100%),
    radial-gradient(circle 1px at 62% 12%,rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(circle 1px at 78% 28%,rgba(180,160,255,0.8) 0%,transparent 100%),
    radial-gradient(circle 2px at 88% 6%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(circle 1px at 35% 55%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(circle 1px at 70% 48%,rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(circle 1px at 5%  72%,rgba(130,100,255,0.5) 0%,transparent 100%),
    radial-gradient(circle 1px at 93% 65%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(circle 1px at 50% 82%,rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(circle 2px at 20% 90%,rgba(255,200,60,0.4)  0%,transparent 100%);
  animation:starPulse 4s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes starPulse{0%{opacity:.6}100%{opacity:1}}

/* top/bottom pixel border lines */
#start-screen::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#7b4fff,#ffe066,#7b4fff,transparent);
  pointer-events:none;
}

.ss-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  width:100%;max-width:480px;
  padding:0 20px;
}

/* ── GAME TITLE ── */
.ss-tagline{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,2vw,10px);
  color:#7b4fff;
  letter-spacing:4px;
  margin-bottom:10px;
  text-align:center;
  opacity:0.85;
}
.ss-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(22px,7vw,52px);
  color:#ffe066;
  text-align:center;
  letter-spacing:3px;
  line-height:1.3;
  /* solid visible text — NO transparent clip */
  text-shadow:
    0 0 20px rgba(255,200,40,0.9),
    0 0 40px rgba(255,160,0,0.6),
    0 0 80px rgba(255,100,0,0.3),
    3px 3px 0 rgba(0,0,0,0.8);
  animation:titleGlow 3s ease-in-out infinite;
  margin-bottom:6px;
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 20px rgba(255,200,40,0.9),0 0 40px rgba(255,160,0,0.6),3px 3px 0 rgba(0,0,0,0.8)}
  50%{text-shadow:0 0 30px rgba(255,220,60,1),0 0 60px rgba(255,180,0,0.8),0 0 100px rgba(255,100,0,0.4),3px 3px 0 rgba(0,0,0,0.8)}
}
.ss-subtitle{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(6px,1.8vw,9px);
  color:#44ffcc;
  text-align:center;
  letter-spacing:2px;
  opacity:0.8;
  margin-bottom:28px;
}

/* divider */
.ss-divider{
  width:100%;max-width:320px;height:2px;
  background:linear-gradient(90deg,transparent,#7b4fff88,#ffe06688,#7b4fff88,transparent);
  margin-bottom:28px;
  border-radius:1px;
}

/* ── NAME INPUT ── */
.ss-label{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,2vw,9px);
  color:#a88bff;
  letter-spacing:2px;
  margin-bottom:10px;
  align-self:flex-start;
}
#pname{
  width:100%;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(9px,2.5vw,13px);
  color:#ffe066;
  background:rgba(123,79,255,0.08);
  border:2px solid rgba(123,79,255,0.4);
  padding:12px 14px;
  outline:none;
  letter-spacing:2px;
  margin-bottom:20px;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
  border-radius:0;
}
#pname:focus{
  border-color:#7b4fff;
  box-shadow:0 0 0 1px #7b4fff44,0 0 16px #7b4fff44;
}
#pname::placeholder{color:rgba(123,79,255,0.4);font-size:clamp(7px,2vw,10px)}

/* ── DIFFICULTY BUTTONS ── */
.ss-label-sm{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(6px,1.8vw,8px);
  color:#a88bff;
  letter-spacing:2px;
  margin-bottom:8px;
  align-self:flex-start;
}
.diff-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  width:100%;
  margin-bottom:20px;
}
.diff-btn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(6px,1.8vw,8px);
  border:2px solid;
  background:rgba(6,8,16,0.7);
  padding:10px 4px;
  cursor:pointer;
  text-align:center;
  line-height:1.8;
  transition:all .15s ease;
  -webkit-tap-highlight-color:transparent;
  border-radius:2px;
}
.diff-btn[data-d=easy]  {color:#44ff88;border-color:rgba(68,255,136,0.35)}
.diff-btn[data-d=normal]{color:#ffe066;border-color:rgba(255,224,102,0.35)}
.diff-btn[data-d=hard]  {color:#ff8844;border-color:rgba(255,136,68,0.35)}
.diff-btn[data-d=hell]  {color:#ff44ff;border-color:rgba(255,68,255,0.35)}
.diff-btn.active{
  background:rgba(255,255,255,0.07);
  border-color:currentColor;
  box-shadow:0 0 12px currentColor;
  text-shadow:0 0 8px currentColor;
  transform:translateY(-1px);
}

/* ── WEAPON BUTTONS ── */
.wpn-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  width:100%;
  margin-bottom:24px;
}
.wpn-btn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(6px,1.5vw,7px);
  background:rgba(6,8,16,0.7);
  border:2px solid rgba(123,79,255,0.25);
  color:#a88bff;
  padding:10px 4px;
  cursor:pointer;
  text-align:center;
  line-height:1.8;
  transition:all .15s ease;
  -webkit-tap-highlight-color:transparent;
  border-radius:2px;
}
.wpn-btn .wicon{font-size:18px;display:block;margin-bottom:2px}
.wpn-btn.active{
  border-color:#44ffcc;
  color:#44ffcc;
  background:rgba(68,255,204,0.08);
  box-shadow:0 0 10px rgba(68,255,204,0.3);
  transform:translateY(-1px);
}

/* ── START BUTTON ── */
#start-btn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(10px,3vw,14px);
  color:#060810;
  background:linear-gradient(135deg,#ffe066,#ffaa22);
  border:none;
  padding:14px 36px;
  cursor:pointer;
  letter-spacing:3px;
  box-shadow:0 0 24px rgba(255,200,40,0.6),0 4px 0 rgba(180,120,0,0.8);
  transition:transform .08s,box-shadow .08s;
  -webkit-tap-highlight-color:transparent;
  border-radius:2px;
  width:100%;
  max-width:280px;
}
#start-btn:active{
  transform:translateY(3px);
  box-shadow:0 0 16px rgba(255,200,40,0.4),0 1px 0 rgba(180,120,0,0.8);
}

/* ────────────────────────────────────────
   GAME WRAPPER (canvas + HUD + gamepad)
──────────────────────────────────────── */
#game-wrap{
  display:none;
  position:absolute;inset:0;
  flex-direction:column;
  align-items:center;justify-content:center;
}
#game-wrap.show{display:flex}

/* canvas container — sized by JS */
#canvas-box{
  position:relative;
  flex-shrink:0;
}
canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  -ms-interpolation-mode:nearest-neighbor;
}

/* ── IN-GAME HUD (drawn ON canvas, but name shown above) ── */
#hud-bar{
  position:absolute;
  top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 10px;
  background:linear-gradient(180deg,rgba(0,0,0,0.75),transparent);
  pointer-events:none;
  z-index:5;
  font-family:'Press Start 2P',monospace;
}
.hb{display:flex;align-items:center;gap:4px;font-size:8px}
.hb-lbl{color:#a88bff}
.hb-val{color:#fff;text-shadow:0 0 6px #7b4fff}
#hb-name{color:#ffe066;font-size:7px;max-width:90px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#hb-ammo{color:#44ffcc;font-size:7px}

/* ── PAUSE OVERLAY ── */
#pause-screen{
  display:none;
  position:absolute;inset:0;z-index:60;
  background:rgba(0,0,0,0.85);
  flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#pause-screen.show{display:flex}
.ps-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(14px,4vw,22px);
  color:#ffe066;
  text-shadow:0 0 20px rgba(255,200,40,0.8);
  letter-spacing:4px;
}
.ps-btn{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(8px,2.5vw,11px);
  background:rgba(123,79,255,0.15);
  border:2px solid rgba(123,79,255,0.5);
  color:#a88bff;
  padding:12px 32px;
  cursor:pointer;
  letter-spacing:2px;
  transition:all .1s;
  -webkit-tap-highlight-color:transparent;
  width:200px;text-align:center;
}
.ps-btn:active{background:rgba(123,79,255,0.4);color:#fff}
#ps-quit{color:#ff6666;border-color:rgba(255,80,80,0.4)}
#ps-quit:active{background:rgba(255,60,60,0.25)}

/* ────────────────────────────────────────
   PUBG-STYLE GAMEPAD (touch only)
──────────────────────────────────────── */
#gamepad{
  display:none;
  position:absolute;
  bottom:0;left:0;right:0;
  height:160px;
  pointer-events:none;
  z-index:20;
}
@media (pointer:coarse){#gamepad{display:block}}

/* left cluster */
#gp-left{
  position:absolute;
  bottom:14px;left:14px;
  width:148px;height:148px;
  pointer-events:auto;
}
/* right cluster */
#gp-right{
  position:absolute;
  bottom:14px;right:14px;
  width:200px;height:148px;
  display:flex;flex-direction:column;
  align-items:flex-end;justify-content:flex-end;
  gap:12px;
  pointer-events:auto;
}

/* shared btn style */
.gp-btn{
  position:absolute;
  border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
  color:rgba(255,255,255,0.7);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  -webkit-user-select:none;
  /* Glassy PUBG style */
  background:radial-gradient(circle at 38% 32%,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0.04) 60%,transparent 100%);
  border:1.5px solid rgba(255,255,255,0.22);
  box-shadow:
    0 2px 12px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.25),
    inset 0 -1px 0 rgba(0,0,0,0.2);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  transition:background .06s,box-shadow .06s,transform .06s;
}
.gp-btn.pressed{
  background:radial-gradient(circle at 38% 32%,rgba(123,79,255,0.55) 0%,rgba(123,79,255,0.2) 60%,transparent 100%);
  box-shadow:0 0 20px rgba(123,79,255,0.7),inset 0 1px 0 rgba(255,255,255,0.3),0 2px 8px rgba(0,0,0,0.4);
  transform:scale(0.93);
  color:#fff;
  border-color:rgba(123,79,255,0.8);
}
.gp-icon{font-size:20px;line-height:1}
.gp-lbl{font-size:6px;opacity:0.7;margin-top:1px;letter-spacing:0}

/* D-pad positions */
#gp-left-btn {left:0;   bottom:48px; width:52px;height:52px;font-size:20px}
#gp-right-btn{right:0;  bottom:48px; width:52px;height:52px;font-size:20px}
#gp-jump-btn {left:48px;bottom:96px; width:52px;height:52px;font-size:18px}
.gp-center{
  position:absolute;left:48px;bottom:48px;
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
}

/* Fire button */
#gp-fire-btn{
  width:68px;height:68px;
  border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  background:radial-gradient(circle at 38% 32%,rgba(68,255,204,0.28) 0%,rgba(68,255,204,0.07) 60%,transparent 100%);
  border:2px solid rgba(68,255,204,0.45);
  box-shadow:0 0 18px rgba(68,255,204,0.3),inset 0 1px 0 rgba(255,255,255,0.25),0 2px 10px rgba(0,0,0,0.5);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  color:rgba(68,255,204,0.9);
  transition:background .06s,box-shadow .06s,transform .06s;
}
#gp-fire-btn .gp-icon{font-size:24px}
#gp-fire-btn .gp-lbl{font-size:6px;color:rgba(68,255,204,0.7)}
#gp-fire-btn.pressed{
  background:radial-gradient(circle at 38% 32%,rgba(68,255,204,0.55) 0%,rgba(68,255,204,0.2) 60%,transparent 100%);
  box-shadow:0 0 30px rgba(68,255,204,0.7),inset 0 1px 0 rgba(255,255,255,0.3),0 2px 8px rgba(0,0,0,0.4);
  transform:scale(0.91);color:#fff;
}

/* ESC button (smaller) */
#gp-esc-btn{
  width:44px;height:44px;
  border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  background:radial-gradient(circle at 38% 32%,rgba(255,80,80,0.2) 0%,rgba(255,80,80,0.05) 60%,transparent 100%);
  border:1.5px solid rgba(255,80,80,0.35);
  box-shadow:0 0 12px rgba(255,80,80,0.2),inset 0 1px 0 rgba(255,255,255,0.15),0 2px 8px rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  color:rgba(255,120,120,0.85);font-size:7px;
  transition:background .06s,transform .06s;
}
#gp-esc-btn.pressed{background:rgba(255,60,60,0.35);transform:scale(0.91);color:#fff}
</style>
</head>
<body>

<!-- Portrait rotation message -->
<div id="rotate-msg">
  <div class="r-icon">📱</div>
  <p>ROTATE YOUR DEVICE<br>TO LANDSCAPE MODE<br>TO PLAY</p>
</div>

<!-- ════════════════════════════════
     APP ROOT
════════════════════════════════ -->
<div id="app">

  <!-- ══ START SCREEN ══ -->
  <div id="start-screen">
    <div class="ss-inner">
      <div class="ss-tagline">— Pixel Adventure —</div>
      <div class="ss-title">PIXEL<br>MEHEDI</div>
      <div class="ss-subtitle">10 LEVELS · SHOOT · SURVIVE</div>
      <div class="ss-divider"></div>

      <div class="ss-label">YOUR NAME</div>
      <input id="pname" type="text" maxlength="12" placeholder="ENTER NAME" autocomplete="off" spellcheck="false">

      <div class="ss-label-sm">WEAPON</div>
      <div class="wpn-grid">
        <button class="wpn-btn active" data-w="pistol"><span class="wicon">🔫</span>PISTOL<br><span style="font-size:5px;color:#7b4fff88">Fast·Weak</span></button>
        <button class="wpn-btn" data-w="cannon"><span class="wicon">💥</span>CANNON<br><span style="font-size:5px;color:#7b4fff88">Slow·Power</span></button>
        <button class="wpn-btn" data-w="laser"><span class="wicon">⚡</span>LASER<br><span style="font-size:5px;color:#7b4fff88">Rapid·Burn</span></button>
      </div>

      <div class="ss-label-sm">DIFFICULTY</div>
      <div class="diff-grid">
        <button class="diff-btn active" data-d="easy">😊<br>EASY<br><span style="font-size:5px">5 LIVES</span></button>
        <button class="diff-btn" data-d="normal">😤<br>NORMAL<br><span style="font-size:5px">3 LIVES</span></button>
        <button class="diff-btn" data-d="hard">😰<br>HARD<br><span style="font-size:5px">2 LIVES</span></button>
        <button class="diff-btn" data-d="hell">💀<br>HELL<br><span style="font-size:5px">1 LIFE</span></button>
      </div>

      <button id="start-btn">▶ START GAME</button>
    </div>
  </div>

  <!-- ══ GAME SCREEN ══ -->
  <div id="game-wrap">
    <div id="canvas-box">
      <canvas id="c"></canvas>

      <!-- HUD overlay -->
      <div id="hud-bar">
        <div class="hb"><span class="hb-lbl">★</span><span class="hb-val" id="hb-score">0</span><span style="color:#7b4fff44;margin:0 4px">|</span><span id="hb-name">HERO</span></div>
        <div class="hb"><span class="hb-val" id="hb-lv">LV1/10</span></div>
        <div class="hb"><span id="hb-ammo">🔫</span><span style="color:#7b4fff44;margin:0 4px">|</span><span class="hb-lbl">♥</span><span class="hb-val" id="hb-lives">3</span></div>
      </div>

      <!-- Pause screen -->
      <div id="pause-screen">
        <div class="ps-title">PAUSED</div>
        <button class="ps-btn" id="ps-resume">▶ RESUME</button>
        <button class="ps-btn" id="ps-quit">✕ QUIT</button>
        <div style="font-family:'Press Start 2P',monospace;font-size:6px;color:#4a5568;margin-top:4px">ESC TO RESUME</div>
      </div>

      <!-- PUBG Gamepad -->
      <div id="gamepad">
        <!-- Left D-pad -->
        <div id="gp-left">
          <div class="gp-btn" id="gp-left-btn"><span class="gp-icon">◀</span></div>
          <div class="gp-center"></div>
          <div class="gp-btn" id="gp-right-btn"><span class="gp-icon">▶</span></div>
          <div class="gp-btn" id="gp-jump-btn"><span class="gp-icon">▲</span><span class="gp-lbl">JUMP</span></div>
        </div>
        <!-- Right actions -->
        <div id="gp-right">
          <div id="gp-fire-btn"><span class="gp-icon">🔫</span><span class="gp-lbl">FIRE</span></div>
          <div id="gp-esc-btn">ESC</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- end #app -->

<script>
'use strict';
// ═══════════════════════════════════════════════════════
//  PIXEL MEHEDI v6 — Android-Compatible Full Engine
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const TILE = 20, COLS = 52, ROWS = 18, MAX_LV = 10;
let WORLD_W = COLS * TILE;
let GW = 640, GH = 360; // logical game resolution

// ── RESIZE: fill screen at 16:9 ─────────────────────
function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  let w = vw, h = vw * 9 / 16;
  if (h > vh) { h = vh; w = vh * 16 / 9; }
  w = Math.floor(w); h = Math.floor(h);
  canvas.width = w; canvas.height = h;
  GW = w; GH = h;
  const box = document.getElementById('canvas-box');
  box.style.width = w + 'px';
  box.style.height = h + 'px';
  const gp = document.getElementById('gamepad');

function wireBtn(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  function on(e) { e.preventDefault(); inp[key] = true; el.classList.add('pressed'); }
  function off(e) { e.preventDefault(); inp[key] = false; el.classList.remove('pressed'); }
  el.addEventListener('touchstart', on, { passive: false });
  el.addEventListener('touchend', off, { passive: false });
  el.addEventListener('touchcancel', off, { passive: false });
  el.addEventListener('mousedown', e => { e.preventDefault(); inp[key] = true; el.classList.add('pressed'); });
  el.addEventListener('mouseup', () => { inp[key] = false; el.classList.remove('pressed'); });
}

// ═══════════════════════════════════════════════════════
//  LEVEL GENERATOR
// ═══════════════════════════════════════════════════════
function rni(a, b) { return Math.floor(a + Math.random() * (b - a)); }
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) { const j = rni(0, i + 1); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function genLevel(lvNum) {
  const ti = lvNum - 1;
  const theme = THEMES[ti], etype = ETYPES[ti];
  const diff = 1 + ti * 0.10;
  const ROWS_P = [ROWS - 5, ROWS - 7, ROWS - 9];
  const grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
  // Floor
  for (let r = ROWS - 3; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = 1;
  // Gaps (later levels)
  const nGaps = ti > 1 ? Math.min(ti - 1, 4) : 0;
  for (let g = 0; g < nGaps; g++) {
    const gc = 8 + rni(0, COLS - 18), gw = 2 + rni(0, 2);
    for (let c = gc; c < gc + gw && c < COLS - 5; c++)
      for (let r = ROWS - 3; r < ROWS; r++) grid[r][c] = 0;
  }
  // Platforms
  let lr = ROWS - 4, lc = 2;
  const nP = 8 + ti;
  for (let i = 0; i < nP; i++) {
    const rowOpts = ROWS_P.filter(r => Math.abs(r - lr) <= 4);
    const row = rowOpts.length > 0 ? rowOpts[rni(0, rowOpts.length)] : ROWS_P[0];
    const minC = Math.max(2, lc + 2), maxC = Math.min(COLS - 10, lc + 10);
    if (minC >= maxC) { lc = 2; continue; }
    const col = rni(minC, maxC), len = rni(4, 9);
    let ok = true;
    for (let c2 = col; c2 < col + len && c2 < COLS - 1; c2++) if (grid[row]?.[c2] !== 0) { ok = false; break; }
    if (ok) { for (let c2 = col; c2 < col + len && c2 < COLS - 1; c2++) grid[row][c2] = 1; lr = row; lc = col + len; }
  }
  // Coins
  const cC = []; for (let r = 1; r < ROWS - 2; r++) for (let c = 2; c < COLS - 1; c++) if (grid[r][c] === 0 && grid[r + 1]?.[c] === 1) cC.push([r, c]);
  shuffle(cC).slice(0, 6 + ti * 2).forEach(([r, c]) => { if (grid[r][c] === 0) grid[r][c] = 2; });
  // Enemies
  const eC = []; for (let r = 1; r < ROWS - 3; r++) for (let c = 6; c < COLS - 3; c++) if (grid[r][c] === 0 && (grid[r + 1]?.[c] === 1 || etype.fly)) eC.push([r, c]);
  shuffle(eC).slice(0, 2 + Math.floor(ti * 1.4)).forEach(([r, c]) => { if (grid[r][c] === 0) grid[r][c] = 3; });
  // Spikes
  if (ti > 2) {
    const sC = []; for (let c = 6; c < COLS - 3; c++) if (grid[ROWS - 4][c] === 0 && grid[ROWS - 3][c] === 1) sC.push([ROWS - 4, c]);
    shuffle(sC).slice(0, ti * 2).forEach(([r, c]) => { if (grid[r][c] === 0) grid[r][c] = 4; });
  }
  // Flag
  let fp = false;
  for (let c = COLS - 4; c >= COLS - 12 && !fp; c--)
    for (let r = ROWS - 5; r < ROWS - 2 && !fp; r++)
      if (grid[r][c] === 0 && grid[r + 1]?.[c] === 1) { grid[r][c] = 5; fp = true; }
  if (!fp) grid[ROWS - 4][COLS - 4] = 5;

  const platforms = [], coins = [], enemies = [], spikes = [];
  let flagPos = null;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const x = c * TILE, y = r * TILE, v = grid[r][c];
    if (v === 1) platforms.push({ x, y, w: TILE, h: TILE });
    if (v === 2) coins.push({ x: x + 4, y: y + 4, w: 12, h: 12, got: false, anim: Math.random() * Math.PI * 2 });
    if (v === 3) { const sp = etype.bs * diff * cfg.eSpd * (0.8 + Math.random() * 0.4); enemies.push(mkEnemy(etype, x, y, sp, lvNum)); }
    if (v === 4) spikes.push({ x: x + 2, y: y + 6, w: TILE - 4, h: TILE - 6 });
    if (v === 5) flagPos = { x, y };
  }
  return { platforms, coins, enemies, spikes, flagPos, theme, etype };
}

function mkEnemy(type, x, y, spd, lv) {
  const w = Math.round(TILE * type.sz), h = Math.round(14 * type.sz);
  const ey = y - h + TILE;
  return {
    type, x, y: ey, w, h, vx: spd, vy: 0, dir: Math.random() < 0.5 ? 1 : -1,
    hp: type.hp, maxHp: type.hp, onGround: false, dead: false,
    anim: Math.random() * Math.PI * 2, flicker: 0,
    flyBase: ey, flyAmp: 22 + Math.random() * 28, flySpd: 0.022 + Math.random() * 0.018, flyT: Math.random() * Math.PI * 2,
    shootCd: 60 + rni(0, 60), lv,
  };
}

// ── PHYSICS ──────────────────────────────────────────
function ov(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
function resY(o, pl) {
  for (const p of pl) {
    if (o.x + 2 < p.x + p.w && o.x + o.w - 2 > p.x) {
      if (o.vy >= 0 && o.y + o.h > p.y && o.y + o.h < p.y + p.h + Math.abs(o.vy) + 2) { o.y = p.y - o.h; o.vy = 0; o.onGround = true; }
      else if (o.vy < 0 && o.y < p.y + p.h && o.y > p.y + o.vy - 2) { o.y = p.y + p.h; o.vy = 0; }
    }
  }
}
function resX(o, pl) {
  for (const p of pl) {
    if (o.y + 2 < p.y + p.h && o.y + o.h - 2 > p.y) {
      if (o.vx > 0 && o.x + o.w > p.x && o.x + o.w < p.x + p.w + Math.abs(o.vx) + 2) { o.x = p.x - o.w; o.vx = 0; }
      else if (o.vx < 0 && o.x < p.x + p.w && o.x > p.x + o.vx - 2) { o.x = p.x + p.w; o.vx = 0; }
    }
  }
}

// ── PARTICLES ────────────────────────────────────────
function spawnParts(x, y, col, n, spd) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    parts.push({ x, y, vx: Math.cos(a) * spd * (0.5 + Math.random()), vy: Math.sin(a) * spd * (0.5 + Math.random()), col, life: 14 + rni(0, 10), maxLife: 24 });
  }
}

// ── SHOOT ────────────────────────────────────────────
function doShoot() {
  if (!player || player.dead || !state || state.phase !== 'play' || paused) return;
  if (player.scd > 0) return;
  player.scd = wpn.cd;
  const bx = player.dir > 0 ? player.x + player.w : player.x - wpn.sz;
  pBullets.push({ x: bx, y: player.y + player.h / 2 - wpn.sz / 2, w: wpn.sz, h: wpn.sz, vx: wpn.spd * player.dir, vy: 0, dmg: wpn.dmg, col: wpn.col, tr: wpn.tr, dead: false, life: 70 + Math.round(180 / wpn.spd) });
  spawnParts(bx, player.y + player.h / 2, wpn.col, 4, 2);
}

// ── UPDATE ───────────────────────────────────────────
function updPlayer() {
  if (player.dead) return;
  const L = keys.ArrowLeft || keys.a || keys.A || inp.left;
  const R = keys.ArrowRight || keys.d || keys.D || inp.right;
  const J = keys.ArrowUp || keys.w || keys.W || keys[' '] || inp.jump;
  if (L) { player.vx = -cfg.spd; player.dir = -1; }
  else if (R) { player.vx = cfg.spd; player.dir = 1; }
  else player.vx *= 0.72;
  if (J) player.jBuf = 10;
  if (player.jBuf > 0) player.jBuf--;
  if (player.onGround) player.coy = 10; else if (player.coy > 0) player.coy--;
  if (player.jBuf > 0 && player.coy > 0) { player.vy = cfg.jmp; player.jBuf = 0; player.coy = 0; spawnParts(player.x + 8, player.y + player.h, '#aaffff', 5, 2); }
  player.vy = Math.min(player.vy + cfg.grav, 14);
  player.onGround = false;
  player.x += player.vx; player.x = Math.max(0, Math.min(WORLD_W - player.w, player.x));
  resX(player, platforms); player.y += player.vy; resY(player, platforms);
  if (player.onGround && Math.abs(player.vx) > 0.3) player.anim += 0.18;
  player.blinkT--; if (player.blinkT <= 0) player.blinkT = 80 + rni(0, 100);
  if (player.inv > 0) player.inv--;
  if (player.scd > 0) player.scd--;
  if (shootPending) { shootPending = false; doShoot(); }
  if (player.y > GH + 80) killPlayer();
  if (player.inv <= 0) {
    spikes.forEach(s => { if (ov(player, s)) killPlayer(); });
    eBullets.forEach(b => { if (!b.dead && ov(player, { x: b.x, y: b.y, w: b.w, h: b.h })) { b.dead = true; killPlayer(); } });
  }
  coins.forEach(c => { if (!c.got && ov(player, c)) { c.got = true; state.score += 100 * state.level; spawnParts(c.x + 6, c.y + 6, '#ffe066', 6, 3); updateHUD(); } });
  enemies.forEach(e => {
    if (e.dead || !ov(player, e) || player.inv > 0) return;
    if (player.vy > 1 && player.y + player.h < e.y + e.h * 0.6) {
      e.hp--; spawnParts(e.x + e.w / 2, e.y, e.type.col, 8, 4);
      if (e.hp <= 0) { e.dead = true; state.score += 300 * state.level; updateHUD(); } else e.flicker = 35;
      player.vy = -7.5;
    } else killPlayer();
  });
  if (flagPos && coins.every(c => c.got)) {
    if (ov(player, { x: flagPos.x + 2, y: flagPos.y - 44, w: 22, h: 64 })) { state.phase = 'win'; state.winT = 130; state.winLocked = true; }
  }
}

function updEnemies() {
  enemies.forEach(e => {
    if (e.dead) return;
    if (e.flicker > 0) e.flicker--;
    if (e.type.fly) {
      e.flyT += e.flySpd * (1 + e.lv * 0.05);
      e.y = e.flyBase + Math.sin(e.flyT) * e.flyAmp;
      if (e.type.chase && player && !player.dead) { const dx = player.x - e.x, dy = player.y - e.y, d = Math.sqrt(dx * dx + dy * dy) || 1; e.x += dx / d * e.vx; e.dir = dx > 0 ? 1 : -1; }
      else { e.x += e.vx * e.dir; if (e.x <= 0 || e.x + e.w >= WORLD_W) e.dir *= -1; }
    } else {
      e.vy = Math.min(e.vy + 0.44, 14);
      if (e.type.chase && player && !player.dead) e.dir = (player.x > e.x) ? 1 : -1;
      e.x += e.vx * e.dir; e.onGround = false;
      const pvx = e.vx; resX(e, platforms); if (e.vx === 0 && pvx !== 0) e.dir *= -1;
      e.y += e.vy; resY(e, platforms);
      if (e.x <= 0 || e.x + e.w >= WORLD_W) e.dir *= -1;
      if (e.type.jmp && e.onGround && player && !player.dead && Math.abs(player.x - e.x) < 130 && Math.random() < 0.02) e.vy = -(7 + e.lv * 0.25);
    }
    e.anim += 0.14;
    if (e.type.shoot && player && !player.dead) {
      e.shootCd--;
      if (e.shootCd <= 0) {
        e.shootCd = Math.max(30, 80 - e.lv * 5);
        const dx = player.x - e.x, dy = player.y - e.y, d = Math.sqrt(dx * dx + dy * dy) || 1, sp = 2.5 + e.lv * 0.2;
        eBullets.push({ x: e.x + e.w / 2 - 3, y: e.y + e.h / 2 - 3, w: 6, h: 6, vx: dx / d * sp, vy: dy / d * sp, col: e.type.col, dead: false, life: 130 });
      }
    }
  });
}

function updBullets() {
  pBullets.forEach(b => {
    if (b.dead) return; b.x += b.vx; b.life--;
    if (b.life <= 0 || b.x < -20 || b.x > WORLD_W + 20) { b.dead = true; return; }
    for (const p of platforms) if (ov({ x: b.x, y: b.y, w: b.w, h: b.h }, p)) { b.dead = true; spawnParts(b.x, b.y, b.col, 3, 2); break; }
    if (!b.dead) enemies.forEach(e => {
      if (e.dead) return;
      if (ov({ x: b.x, y: b.y, w: b.w, h: b.h }, e)) { b.dead = true; e.hp -= b.dmg; spawnParts(b.x, b.y, e.type.col, 6, 3); if (e.hp <= 0) { e.dead = true; state.score += 300 * state.level; updateHUD(); } else e.flicker = 35; }
    });
  });
  pBullets = pBullets.filter(b => !b.dead);
  eBullets.forEach(b => {
    if (b.dead) return; b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || b.x < -40 || b.x > WORLD_W + 40 || b.y < -40 || b.y > GH + 40) b.dead = true;
    if (!b.dead) for (const p of platforms) if (ov({ x: b.x, y: b.y, w: b.w, h: b.h }, p)) { b.dead = true; break; }
  });
  eBullets = eBullets.filter(b => !b.dead);
}

function updParts() {
  parts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.14; p.life--; });
  parts = parts.filter(p => p.life > 0);
}

function updCam() {
  const tx = player.x - 640 / 2 + player.w / 2;
  state.camX += (tx - state.camX) * 0.13;
  state.camX = Math.max(0, Math.min(WORLD_W - 640, state.camX));
}

function killPlayer() {
  if (player.dead || player.inv > 0) return;
  player.dead = true; player.vy = -8; spawnParts(player.x + 8, player.y + 10, '#ff4466', 12, 4);
  state.lives--; updateHUD(); state.deathT = 120;
}

function advanceLevel() { state.level++; state.phase = 'play'; state.winT = 0; state.winLocked = true; pBullets = []; eBullets = []; parts = []; loadLevel(state.level); }
function doRestart() { state.score = 0; state.lives = cfg.lives; state.level = 1; state.phase = 'play'; state.deathT = 0; state.winT = 0; pBullets = []; eBullets = []; parts = []; loadLevel(1); updateHUD(); }

// ═══════════════════════════════════════════════════════
//  DRAW — scaled to any canvas size
// ═══════════════════════════════════════════════════════
function drawBg() {
  // Sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, GH);
  g.addColorStop(0, theme.skyA); g.addColorStop(0.5, theme.skyB); g.addColorStop(1, theme.skyC);
  ctx.fillStyle = g; ctx.fillRect(0, 0, GW, GH);
  // Stars
  const t = state.tick;
  for (let i = 0; i < 80; i++) {
    const ss = ((i * 139 + state.camX * sx(0.08)) % GW + GW) % GW;
    const sy2 = (i * 53) % (GH * 0.72);
    const pulse = 0.5 + Math.sin(t * 0.04 + i * 0.7) * 0.4;
    ctx.globalAlpha = pulse * 0.85;
    ctx.fillStyle = theme.starC;
    ctx.fillRect(~~ss, ~~sy2, i % 7 === 0 ? Math.round(sx(2)) : Math.round(sx(1)), i % 7 === 0 ? Math.round(sy(2)) : Math.round(sy(1)));
  }
  ctx.globalAlpha = 1;
  // Hills (2 parallax layers)
  drawHills(state.camX * 0.15, theme.hillB, GH * 0.72, 10, sy(28), sy(80));
  drawHills(state.camX * 0.28, theme.hillA, GH * 0.79, 14, sy(20), sy(55));
  // Fog
  const fog = ctx.createLinearGradient(0, GH * 0.6, 0, GH);
  fog.addColorStop(0, 'transparent'); fog.addColorStop(1, theme.fog || 'rgba(0,0,0,0.1)');
  ctx.fillStyle = fog; ctx.fillRect(0, GH * 0.6, GW, GH * 0.4);
}

function drawHills(camOff, col, baseY, cnt, minH, maxH) {
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.moveTo(0, GH);
  const seed = col.charCodeAt(1) || 50;
  for (let i = 0; i <= cnt + 1; i++) {
    const bx = (i / cnt) * GW * 2.5 - (camOff % GW);
    const hh = minH + ((seed * i * 137 + i * i * 23) % 1000) / 1000 * (maxH - minH);
    const by = baseY - hh;
    if (i === 0) ctx.lineTo(bx, by);
    else { const px = ((i - 0.5) / cnt * GW * 2.5 - camOff % GW); ctx.quadraticCurveTo(px, by + sy(8), bx, by); }
  }
  ctx.lineTo(GW, GH); ctx.closePath(); ctx.fill();
}

function drawPlatforms() {
  const scx2 = GW / 640, scy2 = GH / 360;
  platforms.forEach(p => {
    const px = Math.round((p.x - state.camX) * scx2), py = Math.round(p.y * scy2);
    const pw = Math.round(p.w * scx2), ph = Math.round(p.h * scy2);
    if (px > GW + 4 || px + pw < -4) return;
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(px + Math.round(2 * scx2), py + ph, pw, Math.round(3 * scy2));
    ctx.fillStyle = theme.pBot; ctx.fillRect(px, py + Math.round(5 * scy2), pw, ph - Math.round(5 * scy2));
    ctx.fillStyle = theme.pMid; ctx.fillRect(px, py + Math.round(3 * scy2), pw, ph - Math.round(6 * scy2));
    ctx.fillStyle = theme.pTop; ctx.fillRect(px, py, pw, Math.round(6 * scy2));
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(px, py, pw, Math.round(2 * scy2));
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for (let i = 0; i < pw; i += Math.round(4 * scx2)) ctx.fillRect(px + i, py + Math.round(2 * scy2), Math.round(2 * scx2), Math.round(scy2));
  });
}

function drawSpikes() {
  const scx2 = GW / 640, scy2 = GH / 360;
  spikes.forEach(s => {
    const sx2 = Math.round((s.x - state.camX) * scx2); if (sx2 > GW || sx2 + s.w * scx2 < 0) return;
    const sy2 = Math.round(s.y * scy2), sw = Math.round(s.w * scx2), sh = Math.round(s.h * scy2);
    ctx.fillStyle = '#bb8822';
    for (let i = 0; i < 2; i++) {
      const tw = sw / 2;
      ctx.beginPath(); ctx.moveTo(sx2 + i * tw, sy2 + sh); ctx.lineTo(sx2 + i * tw + tw / 2, sy2); ctx.lineTo(sx2 + i * tw + tw, sy2 + sh); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffe066'; ctx.fillRect(sx2 + i * tw + Math.round(tw / 2) - 1, sy2, Math.round(2 * scx2), Math.round(4 * scy2)); ctx.fillStyle = '#bb8822';
    }
  });
}

function drawFlag() {
  if (!flagPos) return;
  const scx2 = GW / 640, scy2 = GH / 360;
  const fx = Math.round((flagPos.x - state.camX) * scx2), fy = Math.round(flagPos.y * scy2);
  const ready = coins.every(c => c.got);
  const ph = Math.round(56 * scy2);
  ctx.fillStyle = '#aaaaaa'; ctx.fillRect(fx + Math.round(8 * scx2), fy - ph, Math.round(3 * scx2), ph + Math.round(TILE * scy2));
  const wave = ready ? Math.sin(state.tick * 0.13) * Math.round(5 * scx2) : 0;
  ctx.fillStyle = ready ? '#ff3366' : '#334455';
  ctx.beginPath(); ctx.moveTo(fx + Math.round(11 * scx2), fy - ph + Math.round(4 * scy2)); ctx.lineTo(fx + Math.round(30 * scx2) + wave, fy - ph + Math.round(14 * scy2)); ctx.lineTo(fx + Math.round(11 * scx2), fy - ph + Math.round(24 * scy2)); ctx.closePath(); ctx.fill();
  ctx.fillStyle = ready ? '#ffe066' : 'rgba(160,180,255,0.6)';
  ctx.font = `${Math.round(6 * scx2)}px "Press Start 2P"`; ctx.textAlign = 'center';
  ctx.fillText(ready ? 'GO!' : 'COINS', fx + Math.round(12 * scx2), fy - ph - Math.round(6 * scy2));
}

function drawCoins() {
  const scx2 = GW / 640, scy2 = GH / 360, t = state.tick;
  coins.forEach(c => {
    if (c.got) return;
    const cx2 = Math.round((c.x - state.camX) * scx2); if (cx2 < -20 || cx2 > GW + 20) return;
    const bob = Math.round(Math.sin(t * 0.05 + c.anim) * 3 * scy2);
    const cy2 = Math.round(c.y * scy2) + bob, cw = Math.round(c.w * scx2), ch = Math.round(c.h * scy2);
    ctx.fillStyle = '#ffe066'; ctx.fillRect(cx2 + Math.round(2 * scx2), cy2, cw - Math.round(4 * scx2), ch); ctx.fillRect(cx2, cy2 + Math.round(2 * scy2), cw, ch - Math.round(4 * scy2));
    ctx.fillStyle = '#fffacd'; ctx.fillRect(cx2 + Math.round(2 * scx2), cy2 + Math.round(scy2), Math.round(4 * scx2), Math.round(3 * scy2));
    ctx.fillStyle = '#b8730a';
    ctx.fillRect(cx2, cy2 + Math.round(2 * scy2), Math.round(2 * scx2), ch - Math.round(4 * scy2));
    ctx.fillRect(cx2 + cw - Math.round(2 * scx2), cy2 + Math.round(2 * scy2), Math.round(2 * scx2), ch - Math.round(4 * scy2));
    ctx.fillRect(cx2 + Math.round(2 * scx2), cy2, cw - Math.round(4 * scx2), Math.round(2 * scy2));
    ctx.fillRect(cx2 + Math.round(2 * scx2), cy2 + ch - Math.round(2 * scy2), cw - Math.round(4 * scx2), Math.round(2 * scy2));
  });
}

function drawEnemies() {
  const scx2 = GW / 640, scy2 = GH / 360;
  enemies.forEach(e => {
    if (e.dead) return;
    if (e.flicker > 0 && Math.floor(e.flicker / 4) % 2 === 0) return;
    const ex = Math.round((e.x - state.camX) * scx2); if (ex > GW + 80 || ex + e.w * scx2 < -80) return;
    const ey2 = Math.round(e.y * scy2), ew = Math.round(e.w * scx2), eh = Math.round(e.h * scy2);
    ctx.save();
    if (e.maxHp > 1) {
      ctx.fillStyle = '#330000'; ctx.fillRect(ex - 1, ey2 - Math.round(9 * scy2), ew + 2, Math.round(4 * scy2));
      ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#44ff44' : e.hp / e.maxHp > 0.25 ? '#ffaa00' : '#ff2200';
      ctx.fillRect(ex - 1, ey2 - Math.round(9 * scy2), Math.round((ew + 2) * e.hp / e.maxHp), Math.round(4 * scy2));
    }
    ctx.fillStyle = e.type.dk; ctx.fillRect(ex, ey2 + Math.round(4 * scy2), ew, eh - Math.round(4 * scy2));
    ctx.fillStyle = e.type.col; ctx.fillRect(ex + Math.round(2 * scx2), ey2, ew - Math.round(4 * scx2), eh - Math.round(2 * scy2));
    if (e.type.fly) { ctx.globalAlpha = 0.55 + Math.sin(state.tick * 0.08 + e.anim) * 0.35; ctx.fillStyle = e.type.col; ctx.fillRect(ex, ey2, ew, eh); ctx.globalAlpha = 1; }
    // Eyes
    const eox = e.dir > 0 ? Math.round(ew * 0.58) : Math.round(ew * 0.1);
    ctx.fillStyle = e.type.ey; ctx.fillRect(ex + eox, ey2 + Math.round(4 * scy2), Math.round(4 * scx2), Math.round(4 * scy2));
    ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(ex + eox + Math.round(scx2), ey2 + Math.round(5 * scy2), Math.round(scx2), Math.round(scy2));
    ctx.restore();
  });
  eBullets.forEach(b => {
    if (b.dead) return;
    const bx2 = Math.round((b.x - state.camX) * scx2);
    ctx.fillStyle = b.col; ctx.fillRect(bx2, Math.round(b.y * scy2), Math.round(6 * scx2), Math.round(6 * scy2));
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillRect(bx2 + 1, Math.round(b.y * scy2) + 1, Math.round(2 * scx2), Math.round(2 * scy2));
  });
}

function drawPlayerBullets() {
  const scx2 = GW / 640, scy2 = GH / 360;
  pBullets.forEach(b => {
    const bx2 = Math.round((b.x - state.camX) * scx2), bw = Math.round(b.w * scx2), bh = Math.round(b.h * scy2);
    ctx.fillStyle = b.tr; ctx.fillRect(bx2 - (b.vx > 0 ? bw * 2 : 0), Math.round(b.y * scy2), bw * 2, bh);
    ctx.fillStyle = b.col; ctx.fillRect(bx2, Math.round(b.y * scy2), bw, bh);
    ctx.fillStyle = '#fff'; ctx.fillRect(bx2 + 1, Math.round(b.y * scy2) + 1, Math.max(1, bw - 2), Math.max(1, bh - 2));
  });
}

function drawParts() {
  const scx2 = GW / 640, scy2 = GH / 360;
  parts.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.col;
    ctx.fillRect(Math.round((p.x - state.camX) * scx2), Math.round(p.y * scy2), Math.round(3 * scx2), Math.round(3 * scy2));
  });
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  if (!player) return;
  const scx2 = GW / 640, scy2 = GH / 360, t = state.tick;
  const px = Math.round((player.x - state.camX) * scx2), py = Math.round(player.y * scy2);
  const pw = Math.round(player.w * scx2), ph = Math.round(player.h * scy2);
  const d = player.dir, blink = player.blinkT < 5;
  if (player.dead) { ctx.save(); ctx.globalAlpha = 0.45 + Math.sin(t * 0.2) * 0.45; }
  if (player.inv > 0 && Math.floor(player.inv / 4) % 2 === 1) { ctx.save(); ctx.globalAlpha = 0.3; }
  // Shadow
  if (player.onGround) { ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(px + pw / 2, py + ph + Math.round(2 * scy2), Math.round(9 * scx2), Math.round(3 * scy2), 0, 0, Math.PI * 2); ctx.fill(); }
  // Shoes
  ctx.fillStyle = '#222'; ctx.fillRect(px - Math.round(scx2), py + Math.round(16 * scy2), Math.round(8 * scx2), Math.round(5 * scy2)); ctx.fillRect(px + Math.round(9 * scx2), py + Math.round(16 * scy2), Math.round(8 * scx2), Math.round(5 * scy2));
  // Body
  ctx.fillStyle = '#2255cc'; ctx.fillRect(px + Math.round(2 * scx2), py + Math.round(8 * scy2), Math.round(12 * scx2), Math.round(10 * scy2));
  ctx.fillStyle = '#4488ff'; ctx.fillRect(px + Math.round(4 * scx2), py + Math.round(9 * scy2), Math.round(5 * scx2), Math.round(3 * scy2));
  // Head
  ctx.fillStyle = '#ffcc88'; ctx.fillRect(px + Math.round(scx2), py, Math.round(14 * scx2), Math.round(10 * scy2));
  // Hat
  ctx.fillStyle = '#bb1111'; ctx.fillRect(px, py - Math.round(5 * scy2), Math.round(16 * scx2), Math.round(6 * scy2)); ctx.fillRect(px + Math.round(3 * scx2), py - Math.round(9 * scy2), Math.round(10 * scx2), Math.round(5 * scy2));
  ctx.fillStyle = '#ffe066'; ctx.font = `bold ${Math.round(6 * scx2)}px "Press Start 2P"`; ctx.textAlign = 'left'; ctx.fillText('M', px + Math.round(4 * scx2), py - Math.round(scx2));
  // Eye
  ctx.fillStyle = '#222';
  const ex2 = d > 0 ? px + Math.round(9 * scx2) : px + Math.round(3 * scx2);
  if (!blink) { ctx.fillRect(ex2, py + Math.round(3 * scy2), Math.round(3 * scx2), Math.round(3 * scy2)); ctx.fillStyle = '#fff'; ctx.fillRect(ex2 + (d > 0 ? Math.round(scx2) : 0), py + Math.round(3 * scy2), Math.round(scx2), Math.round(scx2)); }
  else ctx.fillRect(ex2, py + Math.round(5 * scy2), Math.round(3 * scx2), Math.round(scy2));
  // Gun
  ctx.fillStyle = wpn.col;
  if (d > 0) { ctx.fillRect(px + Math.round(14 * scx2), py + Math.round(9 * scy2), Math.round(8 * scx2), Math.round(4 * scy2)); ctx.fillRect(px + Math.round(18 * scx2), py + Math.round(7 * scy2), Math.round(4 * scx2), Math.round(4 * scy2)); }
  else { ctx.fillRect(px - Math.round(8 * scx2), py + Math.round(9 * scy2), Math.round(8 * scx2), Math.round(4 * scy2)); ctx.fillRect(px - Math.round(8 * scx2), py + Math.round(7 * scy2), Math.round(4 * scx2), Math.round(4 * scy2)); }
  // Arm swing
  if (player.onGround && Math.abs(player.vx) > 0.3) { const arm = Math.round(Math.sin(player.anim * 2) * 2 * scy2); ctx.fillStyle = '#ffcc88'; ctx.fillRect(d > 0 ? px - Math.round(2 * scx2) : px + Math.round(14 * scx2), py + Math.round(8 * scy2) + arm, Math.round(4 * scx2), Math.round(5 * scy2)); }
  if (player.dead || player.inv > 0) ctx.restore();
}

function drawHUD2() {
  const scx2 = GW / 640, scy2 = GH / 360;
  // Bottom bar
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, GH - Math.round(15 * scy2), GW, Math.round(15 * scy2));
  ctx.fillStyle = '#3a4a5a'; ctx.font = `${Math.round(5 * scx2)}px "Press Start 2P"`; ctx.textAlign = 'center';
  ctx.fillText('← → MOVE  ↑/SPACE JUMP  F/Z SHOOT  ESC PAUSE', GW / 2, GH - Math.round(4 * scy2));
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, GW, Math.round(15 * scy2));
  ctx.fillStyle = '#a88bff'; ctx.font = `${Math.round(6 * scx2)}px "Press Start 2P"`; ctx.textAlign = 'center';
  ctx.fillText(theme.name, GW / 2, Math.round(11 * scy2));
  const got = coins.filter(c => c.got).length, tot = coins.length;
  ctx.fillStyle = '#ffe066'; ctx.textAlign = 'left'; ctx.fillText(`C:${got}/${tot}`, Math.round(4 * scx2), Math.round(11 * scy2));
  ctx.fillStyle = etype.col; ctx.textAlign = 'right'; ctx.fillText(etype.id.toUpperCase(), GW - Math.round(4 * scx2), Math.round(11 * scy2));

function drawWinFx() {
  for (let i = 0; i < 28; i++) {
    const a = (i / 28) * Math.PI * 2 + state.tick * 0.055;
    const r = (55 + Math.sin(state.tick * 0.055 + i) * 28) * (GW / 640);
    ctx.fillStyle = ['#ffe066', '#ff4466', '#44ffcc', '#4488ff', '#ff88ff', '#fff'][i % 6];
    ctx.fillRect(~~(GW / 2 + Math.cos(a) * r), ~~(GH / 2 + Math.sin(a) * r * 0.55), Math.round(4 * GW / 640), Math.round(4 * GH / 360));
  }
}

function drawMsg(title, lines, col) {
  const scx2 = GW / 640, scy2 = GH / 360;
  ctx.fillStyle = 'rgba(3,3,18,0.88)'; ctx.fillRect(0, 0, GW, GH);
  const bx = Math.round(50 * scx2), by = Math.round(55 * scy2), bw = GW - Math.round(100 * scx2), bh = GH - Math.round(110 * scy2);
  ctx.strokeStyle = col || '#7b4fff'; ctx.lineWidth = Math.round(2 * scx2); ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = col || '#ffe066'; ctx.font = `${Math.round(16 * scx2)}px "Press Start 2P"`; ctx.textAlign = 'center';
  ctx.fillText(title, GW / 2, GH / 2 - Math.round(34 * scy2));
  ctx.fillStyle = '#c0d0ff'; ctx.font = `${Math.round(8 * scx2)}px "Press Start 2P"`;
  (lines || []).forEach((l, i) => ctx.fillText(l, GW / 2, GH / 2 + Math.round(i * 20 * scy2)));
}

// ── MAIN LOOP ────────────────────────────────────────
function loop() {
  if (!running) return;
  requestAnimationFrame(loop);
  if (paused) return;
  ctx.imageSmoothingEnabled = false;
  state.tick++;

  if (state.phase === 'play') {
    updPlayer(); updEnemies(); updBullets(); updParts(); updCam();
    if (state.deathT > 0) { state.deathT--; if (state.deathT === 0) { if (state.lives <= 0) state.phase = 'gameover'; else loadLevel(state.level); } }
  }
  if (state.phase === 'win') { updCam(); state.winT--; if (state.winT <= 60) state.winLocked = false; }

  drawBg(); drawPlatforms(); drawSpikes(); drawFlag(); drawCoins(); drawEnemies(); drawPlayerBullets(); drawParts(); drawPlayer(); drawHUD2();

  if (state.phase === 'gameover') drawMsg('GAME OVER', ['SCORE: ' + state.score, 'PRESS R TO RESTART', 'OR TAP SCREEN'], '#ff4466');
  if (state.phase === 'win') {
    drawWinFx();
    if (state.level < MAX_LV) {
      drawMsg('LEVEL CLEAR!', ['SCORE: ' + state.score, 'PRESS ENTER/SPACE', 'OR TAP TO CONTINUE'], '#44ffcc');
      if (!state.winLocked && (keys['Enter'] || keys[' '] || keys.ArrowUp)) advanceLevel();
    } else {
      drawMsg('YOU WIN! 🏆', ['FINAL SCORE: ' + state.score, 'ALL 10 LEVELS CLEARED!', 'PRESS R TO PLAY AGAIN'], '#ffe066');
    }
  }
}

// Key advance
document.addEventListener('keydown', e => {
  if (!state || !running) return;
  if ((e.key === 'Enter' || e.key === ' ') && state.phase === 'win' && !state.winLocked && state.level < MAX_LV) { e.preventDefault(); advanceLevel(); }
});
</script>
</body>
</html>
